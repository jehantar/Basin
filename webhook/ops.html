<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Basin — System</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Basin">
<meta name="theme-color" content="#0a0f1a">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2338bdf8'/%3E%3Cstop offset='100%25' stop-color='%232563eb'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='url(%23g)'/%3E%3Cpath d='M16 6c-4 0-7 3-7 5 0 3 2.5 4.5 4 6s2 3.5 3 6c1-2.5 1.5-4.5 3-6s4-3 4-6c0-2-3-5-7-5z' fill='white' opacity='0.9'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --base: #0a0f1a;
    --surface: #141b2d;
    --surface-hover: #1a2340;
    --border: #1e293b;
    --border-light: #2a3650;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #10b981;
    --accent-glow: rgba(16, 185, 129, 0.15);
    --alert: #ef4444;
    --nav-active: #10b981;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--base);
    color: var(--text-primary);
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px 48px;
  }

  a { color: var(--accent); text-decoration: none; }

  /* ── Top Navigation ── */
  .top-nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 32px;
    background: linear-gradient(180deg, rgba(10,15,26,0.95) 0%, rgba(10,15,26,0.8) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-tab {
    padding: 16px 28px;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: color 0.25s, border-color 0.25s;
  }
  .nav-tab:hover { color: var(--text-secondary); }
  .nav-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .nav-tab.active {
    color: var(--text-primary);
    border-bottom-color: var(--nav-active);
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-top: 32px;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
  .header h1 span {
    color: var(--accent);
  }
  .header .sync-info {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  /* ── Status Cards ── */
  .status-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 28px;
  }
  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }
  .status-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
    opacity: 0.8;
  }
  .status-card:hover {
    border-color: var(--border-light);
    transform: translateY(-1px);
  }
  .status-card.ok::before { background: var(--accent); }
  .status-card.err::before { background: var(--alert); }
  .status-card.running::before { background: #f59e0b; }

  .sc-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .status-card.ok .sc-label { color: var(--accent); }
  .status-card.err .sc-label { color: var(--alert); }
  .status-card.running .sc-label { color: #f59e0b; }

  .sc-status {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .sc-sub {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .sc-sub .mono {
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  /* ── Run History Table ── */
  .section-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 16px;
  }
  .history-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .history-table th {
    text-align: left;
    padding: 14px 20px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .history-table td {
    padding: 12px 20px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }
  .history-table tr:last-child td {
    border-bottom: none;
  }
  .history-table tr:hover td {
    background: var(--surface-hover);
  }
  .history-table .mono {
    font-family: var(--mono);
    font-size: 0.8rem;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 8px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge.success {
    background: rgba(16, 185, 129, 0.15);
    color: var(--accent);
  }
  .badge.error {
    background: rgba(239, 68, 68, 0.15);
    color: var(--alert);
  }
  .badge.running {
    background: rgba(245, 158, 11, 0.15);
    color: #f59e0b;
  }

  .error-text {
    color: var(--alert);
    font-size: 0.78rem;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Loading Pulse ── */
  .loading-text {
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .page-container { padding: 0 16px 32px; }
    .top-nav { padding: 0 16px; }
    .status-cards { grid-template-columns: repeat(2, 1fr); }
    .sc-status { font-size: 1.2rem; }
  }
  @media (max-width: 500px) {
    .nav-tab { padding: 12px 16px; font-size: 0.78rem; }
    .header h1 { font-size: 1.3rem; }
    .status-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav class="top-nav">
  <a href="/dashboard/fitness" class="nav-tab">Fitness</a>
  <a href="/dashboard/finance" class="nav-tab">Finance</a>
  <a href="/dashboard/investments" class="nav-tab">Investments</a>
  <a href="/dashboard/system" class="nav-tab active">System</a>
</nav>

<div class="page-container">

  <div class="header">
    <h1>Collector <span>Health</span></h1>
    <div class="sync-info" id="syncInfo">loading...</div>
  </div>

  <div class="status-cards" id="statusCards">
    <div class="status-card"><div class="sc-label loading-text">loading</div></div>
    <div class="status-card"><div class="sc-label loading-text">loading</div></div>
    <div class="status-card"><div class="sc-label loading-text">loading</div></div>
    <div class="status-card"><div class="sc-label loading-text">loading</div></div>
  </div>

  <h2 class="section-title">Recent Runs</h2>
  <table class="history-table">
    <thead>
      <tr>
        <th>Collector</th>
        <th>Status</th>
        <th>Started</th>
        <th>Duration</th>
        <th>Rows</th>
        <th>Error</th>
      </tr>
    </thead>
    <tbody id="historyBody">
      <tr><td colspan="6" class="loading-text" style="text-align:center; padding:32px;">Loading run history...</td></tr>
    </tbody>
  </table>

</div>

<script>
(function() {
  function $(id) { return document.getElementById(id); }

  function el(tag, className, text) {
    var e = document.createElement(tag);
    if (className) e.className = className;
    if (text != null) e.textContent = text;
    return e;
  }

  function timeAgo(isoStr) {
    if (!isoStr) return 'never';
    var diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
    if (diff < 60) return Math.round(diff) + 's ago';
    if (diff < 3600) return Math.round(diff / 60) + 'm ago';
    if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
    return Math.round(diff / 86400) + 'd ago';
  }

  function fmtTime(isoStr) {
    if (!isoStr) return '--';
    var d = new Date(isoStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
           d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function fmtDuration(sec) {
    if (sec == null) return '--';
    if (sec < 60) return sec.toFixed(1) + 's';
    return Math.round(sec / 60) + 'm ' + Math.round(sec % 60) + 's';
  }

  function statusClass(s) {
    if (s === 'success') return 'ok';
    if (s === 'error') return 'err';
    return 'running';
  }

  function badgeClass(s) {
    if (s === 'success') return 'success';
    if (s === 'error') return 'error';
    return 'running';
  }

  function capitalize(s) {
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
  }

  function buildCard(c) {
    var cls = statusClass(c.last_status);
    var card = el('div', 'status-card ' + cls);

    card.appendChild(el('div', 'sc-label', capitalize(c.name)));

    var statusLabel = c.last_status === 'success' ? 'OK' : c.last_status.toUpperCase();
    card.appendChild(el('div', 'sc-status', statusLabel));

    var sub1 = el('div', 'sc-sub');
    sub1.appendChild(document.createTextNode(timeAgo(c.last_run) + ' \u00B7 '));
    sub1.appendChild(el('span', 'mono', (c.last_rows || 0) + ' rows'));
    card.appendChild(sub1);

    card.appendChild(el('div', 'sc-sub', c.schedule));

    if (c.last_error) {
      var errDiv = el('div', 'sc-sub error-text', c.last_error);
      errDiv.title = c.last_error;
      card.appendChild(errDiv);
    }

    return card;
  }

  function buildRow(run) {
    var tr = el('tr');

    tr.appendChild(el('td', null, capitalize(run.collector)));

    var statusTd = el('td');
    statusTd.appendChild(el('span', 'badge ' + badgeClass(run.status), run.status));
    tr.appendChild(statusTd);

    tr.appendChild(el('td', 'mono', fmtTime(run.started_at)));
    tr.appendChild(el('td', 'mono', fmtDuration(run.duration_sec)));
    tr.appendChild(el('td', 'mono', String(run.rows_upserted || 0)));

    var errTd = el('td');
    if (run.error_message) {
      var errSpan = el('span', 'error-text', run.error_message);
      errSpan.title = run.error_message;
      errTd.appendChild(errSpan);
    } else {
      errTd.textContent = '--';
    }
    tr.appendChild(errTd);

    return tr;
  }

  function loadStatus() {
    fetch('/api/ops/status')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        $('syncInfo').textContent = 'Updated ' + fmtTime(data.generated_at);

        var container = $('statusCards');
        container.textContent = '';

        data.collectors.forEach(function(c) {
          container.appendChild(buildCard(c));
        });
      });
  }

  function loadHistory() {
    fetch('/api/ops/history?limit=50')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var tbody = $('historyBody');
        tbody.textContent = '';

        if (!data.runs || data.runs.length === 0) {
          var tr = el('tr');
          var td = el('td', null, 'No collector runs found');
          td.colSpan = 6;
          td.style.textAlign = 'center';
          td.style.padding = '32px';
          td.style.color = 'var(--text-muted)';
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }

        data.runs.forEach(function(run) {
          tbody.appendChild(buildRow(run));
        });
      });
  }

  loadStatus();
  loadHistory();
})();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js', {scope: '/'});</script>
</body>
</html>
