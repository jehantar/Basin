<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basin — Finance</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2338bdf8'/%3E%3Cstop offset='100%25' stop-color='%232563eb'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='url(%23g)'/%3E%3Cpath d='M16 6c-4 0-7 3-7 5 0 3 2.5 4.5 4 6s2 3.5 3 6c1-2.5 1.5-4.5 3-6s4-3 4-6c0-2-3-5-7-5z' fill='white' opacity='0.9'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --base: #0a0f1a;
    --surface: #141b2d;
    --surface-hover: #1a2340;
    --border: #1e293b;
    --border-light: #2a3650;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #10b981;
    --accent-glow: rgba(16, 185, 129, 0.15);
    --alert: #ef4444;
    --nav-active: #10b981;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--base);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px 48px;
  }

  a { color: var(--accent); text-decoration: none; }

  /* ── Top Navigation ── */
  .top-nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 32px;
    background: linear-gradient(180deg, rgba(10,15,26,0.95) 0%, rgba(10,15,26,0.8) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-tab {
    padding: 16px 28px;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: color 0.25s, border-color 0.25s;
  }
  .nav-tab:hover { color: var(--text-secondary); }
  .nav-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .nav-tab.active {
    color: var(--text-primary);
    border-bottom-color: var(--nav-active);
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-top: 32px;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
  .header h1 span {
    color: var(--accent);
  }
  .header .sync-info {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  /* ── Summary Cards ── */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 28px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
    opacity: 0.8;
  }
  .summary-card:hover {
    border-color: var(--border-light);
    transform: translateY(-1px);
  }
  .summary-card.spend::before { background: var(--accent); }
  .summary-card.category::before { background: #f59e0b; }
  .summary-card.txn-count::before { background: #3b82f6; }

  .sc-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .summary-card.spend .sc-label { color: var(--accent); }
  .summary-card.category .sc-label { color: #f59e0b; }
  .summary-card.txn-count .sc-label { color: #3b82f6; }

  .sc-value {
    font-family: var(--mono);
    font-size: 2.25rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .sc-sub {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .sc-sub .mono {
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  /* ── Filters Row ── */
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .view-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }
  .view-tab {
    font-family: var(--sans);
    background: transparent;
    color: var(--text-muted);
    border: none;
    border-radius: 7px;
    padding: 8px 20px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
    letter-spacing: 0.02em;
  }
  .view-tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
  .view-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -1px; }
  .view-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(16,185,129,0.25);
  }

  .time-filters {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .preset-btn {
    font-family: var(--mono);
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.75rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
    letter-spacing: 0.02em;
  }
  .preset-btn:hover { color: var(--text-secondary); border-color: var(--border-light); }
  .preset-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .preset-btn.active {
    background: rgba(16,185,129,0.12);
    color: var(--accent);
    border-color: var(--accent);
  }
  .filters-sep {
    color: var(--border-light);
    margin: 0 4px;
    font-size: 0.85rem;
    user-select: none;
  }
  .date-input {
    font-family: var(--mono);
    background: var(--base);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .date-input:focus { border-color: var(--accent); }

  /* ── Detail Panel ── */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    min-height: 440px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* ── Panels ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Charts Grid ── */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .chart-container {
    background: rgba(10,15,26,0.5);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    min-height: 340px;
  }
  .chart-area { width: 100%; min-height: 420px; }

  /* ── Drill-down Table ── */
  .drilldown-panel {
    margin-top: 24px;
    background: rgba(10,15,26,0.4);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: slideDown 0.3s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .drilldown-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }
  .drilldown-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }
  .drilldown-title .cat-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }
  .drilldown-close {
    font-family: var(--sans);
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .drilldown-close:hover { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
  .drilldown-close:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  .batch-save-btn {
    font-family: var(--sans);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 6px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(16,185,129,0.25);
  }
  .batch-save-btn:hover { background: #0d9668; }
  .batch-save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .batch-save-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  /* ── Data Tables ── */
  .table-wrapper {
    max-height: 520px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;
  }
  .table-wrapper::-webkit-scrollbar { width: 6px; }
  .table-wrapper::-webkit-scrollbar-track { background: transparent; }
  .table-wrapper::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .data-table thead { position: sticky; top: 0; z-index: 2; }
  .data-table th {
    text-align: left;
    color: var(--text-muted);
    font-weight: 600;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    background: var(--surface);
  }
  .data-table td {
    padding: 10px 16px;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(30,41,59,0.5);
  }
  .data-table tbody tr { transition: background 0.15s; }
  .data-table tbody tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
  .data-table tbody tr:hover td { background: rgba(16,185,129,0.04); }

  .td-money {
    font-family: var(--mono);
    font-weight: 700;
    color: var(--accent);
    font-size: 0.8rem;
  }
  .td-rank {
    font-family: var(--mono);
    color: var(--text-muted);
    font-size: 0.75rem;
    font-weight: 700;
  }
  .td-count {
    font-family: var(--mono);
    font-size: 0.78rem;
  }

  /* ── Cards Grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .card-block {
    background: rgba(10,15,26,0.5);
    border-radius: 14px;
    padding: 0;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card-block:hover {
    border-color: var(--border-light);
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }
  .card-block-inner {
    padding: 24px 24px 20px;
  }
  .cb-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .cb-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .cb-last4 {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    background: rgba(255,255,255,0.04);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.06em;
  }
  .cb-spend {
    font-family: var(--mono);
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .cb-meta {
    display: flex;
    gap: 20px;
    margin-bottom: 8px;
  }
  .cb-stat {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .cb-stat strong {
    font-family: var(--mono);
    color: var(--text-secondary);
    font-weight: 700;
    font-size: 0.72rem;
  }
  .cb-top-cat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .cb-cat-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cb-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,0.02);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cb-toggle:hover { background: rgba(255,255,255,0.04); color: var(--text-secondary); }
  .cb-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .cb-toggle-arrow {
    display: inline-block;
    transition: transform 0.3s;
    font-size: 0.65rem;
  }
  .cb-toggle.open .cb-toggle-arrow {
    transform: rotate(180deg);
  }

  .cb-txn-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    background: rgba(10,15,26,0.3);
  }
  .cb-txn-list.open {
    overflow-y: auto;
  }
  .cb-txn-row {
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 12px;
    padding: 8px 24px;
    font-size: 0.78rem;
    border-bottom: 1px solid rgba(30,41,59,0.4);
    transition: background 0.15s;
  }
  .cb-txn-row:hover { background: rgba(255,255,255,0.02); }
  .cb-txn-date {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
  }
  .cb-txn-desc { color: var(--text-secondary); }
  .pending-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #f59e0b;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.25);
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .cb-txn-amt {
    font-family: var(--mono);
    font-weight: 700;
    color: var(--accent);
    font-size: 0.75rem;
    text-align: right;
  }

  /* ── Error Banner ── */
  .error-banner {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 12px;
  }
  .error-banner.visible { display: flex; }
  .error-banner .error-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--alert);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
  }
  .error-banner .error-msg {
    flex: 1;
    color: #fca5a5;
    font-size: 0.82rem;
  }
  .error-banner .retry-btn {
    font-family: var(--sans);
    background: rgba(239,68,68,0.15);
    color: #fca5a5;
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 6px;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .error-banner .retry-btn:hover { background: rgba(239,68,68,0.25); }
  .error-banner .retry-btn:focus-visible { outline: 2px solid var(--alert); outline-offset: 1px; }

  /* ── Empty State ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-muted);
    text-align: center;
  }
  .empty-state p {
    margin-bottom: 16px;
    font-size: 0.9rem;
  }

  /* ── Loading Pulse ── */
  .loading-text {
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .page-container { padding: 0 16px 32px; }
    .top-nav { padding: 0 16px; }
    .summary-cards { grid-template-columns: 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
    .cards-grid { grid-template-columns: 1fr; }
    .controls-row { flex-direction: column; align-items: stretch; }
    .time-filters { flex-wrap: wrap; justify-content: center; }
    .view-tabs { justify-content: center; }
    .detail-panel { padding: 16px; }
    .sc-value { font-size: 1.8rem; }
  }
  @media (max-width: 500px) {
    .nav-tab { padding: 12px 16px; font-size: 0.78rem; }
    .header h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<nav class="top-nav">
  <a href="/dashboard/fitness" class="nav-tab">Fitness</a>
  <a href="/dashboard/finance" class="nav-tab active">Finance</a>
  <a href="/dashboard/investments" class="nav-tab">Investments</a>
  <a href="/dashboard/system" class="nav-tab">System</a>
</nav>

<div class="page-container">

  <div class="header">
    <h1>Basin <span>/</span> Finance</h1>
    <span class="sync-info" id="syncInfo">--:--</span>
  </div>

  <div class="error-banner" id="errorBanner">
    <div class="error-icon">!</div>
    <span class="error-msg" id="errorMsg"></span>
    <button class="retry-btn" id="retryBtn" tabindex="0">Retry</button>
  </div>

  <div class="summary-cards">
    <div class="summary-card spend">
      <div class="sc-label">Total Spend</div>
      <div class="sc-value loading-text" id="totalSpendValue">--</div>
      <div class="sc-sub" id="totalSpendSub">&nbsp;</div>
    </div>
    <div class="summary-card category">
      <div class="sc-label">Top Category</div>
      <div class="sc-value loading-text" id="topCategoryValue">--</div>
      <div class="sc-sub" id="topCategorySub">&nbsp;</div>
    </div>
    <div class="summary-card txn-count">
      <div class="sc-label">Transactions</div>
      <div class="sc-value loading-text" id="transactionsValue">--</div>
      <div class="sc-sub" id="transactionsSub">&nbsp;</div>
    </div>
  </div>

  <div class="controls-row">
    <div class="view-tabs" role="tablist">
      <button class="view-tab active" data-view="spending" tabindex="0" role="tab" aria-selected="true">Spending</button>
      <button class="view-tab" data-view="merchants" tabindex="0" role="tab" aria-selected="false">Merchants</button>
      <button class="view-tab" data-view="cards" tabindex="0" role="tab" aria-selected="false">Cards</button>
    </div>
    <div class="time-filters">
      <button class="preset-btn" data-months="1" tabindex="0">1M</button>
      <button class="preset-btn" data-months="3" tabindex="0">3M</button>
      <button class="preset-btn" data-months="6" tabindex="0">6M</button>
      <button class="preset-btn" data-months="12" tabindex="0">1Y</button>
      <button class="preset-btn" data-months="0" tabindex="0">All</button>
      <span class="filters-sep">|</span>
      <input type="date" class="date-input" id="startDate" tabindex="0" aria-label="Start date">
      <span class="filters-sep">&ndash;</span>
      <input type="date" class="date-input" id="endDate" tabindex="0" aria-label="End date">
    </div>
  </div>

  <div class="detail-panel">
    <!-- Spending Panel -->
    <div class="panel active" id="panelSpending">
      <div class="charts-grid">
        <div class="chart-container">
          <div class="chart-area" id="chartMonthly"></div>
        </div>
        <div class="chart-container">
          <div class="chart-area" id="chartCategory"></div>
        </div>
      </div>
      <div id="txnDrilldown" style="display:none;">
        <div class="drilldown-panel">
          <div class="drilldown-header">
            <span class="drilldown-title" id="txnDrillTitle"></span>
            <div style="display:flex;gap:8px;align-items:center;">
              <button class="batch-save-btn" id="batchSaveBtn" tabindex="0" style="display:none;">Save</button>
              <button class="drilldown-close" id="txnDrillClose" tabindex="0">Close</button>
            </div>
          </div>
          <div class="table-wrapper" style="max-height:320px;">
            <table class="data-table" id="txnDrillTable">
              <thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Card</th><th id="txnDrillActionHeader"></th></tr></thead>
              <tbody id="txnDrillBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Merchants Panel -->
    <div class="panel" id="panelMerchants">
      <div class="table-wrapper">
        <table class="data-table" id="merchantsTable">
          <thead>
            <tr>
              <th style="width:60px">#</th>
              <th>Merchant</th>
              <th>Total Spend</th>
              <th># Txns</th>
              <th>Avg Txn</th>
            </tr>
          </thead>
          <tbody id="merchantsBody"></tbody>
        </table>
      </div>
      <div id="merchantDrill" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px;">
          <span class="drilldown-title" id="merchantDrillTitle"></span>
          <button class="drilldown-close" id="merchantDrillClose" tabindex="0">Close</button>
        </div>
        <div class="table-wrapper" style="max-height:300px;">
          <table class="data-table">
            <thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Card</th></tr></thead>
            <tbody id="merchantDrillBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Cards Panel -->
    <div class="panel" id="panelCards">
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  /* ── Category Color Map ── */
  var CATEGORY_COLORS = {
    'Food & Dining': '#f59e0b',
    'Shopping': '#a78bfa',
    'Travel & Transport': '#3b82f6',
    'Health & Fitness': '#10b981',
    'Living': '#ec4899',
    'Entertainment': '#f97316',
    'Other': '#64748b'
  };

  var CARD_ACCENT_COLORS = ['#3b82f6', '#a78bfa', '#f59e0b', '#10b981', '#ec4899', '#06b6d4'];

  /* ── State ── */
  var activeView = 'spending';
  var overviewData = null;
  var merchantsData = null;
  var cardsData = null;
  var activePreset = null;

  /* ── DOM helpers ── */
  function $(id) { return document.getElementById(id); }

  function clearChildren(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function createEl(tag, className, text) {
    var el = document.createElement(tag);
    if (className) el.className = className;
    if (text !== undefined && text !== null) el.textContent = text;
    return el;
  }

  /* ── Formatters ── */
  function fmtMoney(n) {
    if (n == null) return '$0.00';
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtMoneyShort(n) {
    if (n == null) return '$0';
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function fmtNumber(n) {
    if (n == null) return '0';
    return Number(n).toLocaleString('en-US');
  }

  function capitalize(s) {
    if (!s) return '';
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function isoToday() {
    return new Date().toISOString().slice(0, 10);
  }

  function isoMonthsAgo(m) {
    var d = new Date();
    d.setMonth(d.getMonth() - m);
    return d.toISOString().slice(0, 10);
  }

  function getCategoryColor(cat) {
    return CATEGORY_COLORS[cat] || CATEGORY_COLORS['Other'] || '#475569';
  }

  /* ── Error handling ── */
  var errorBanner = $('errorBanner');
  var errorMsg = $('errorMsg');
  var retryBtn = $('retryBtn');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorBanner.classList.add('visible');
  }

  function hideError() {
    errorBanner.classList.remove('visible');
  }

  /* ── DOM refs ── */
  var startInput = $('startDate');
  var endInput = $('endDate');
  var syncInfo = $('syncInfo');

  /* ── Plotly layout builder ── */
  function baseLayout(title, extra) {
    var layout = {
      paper_bgcolor: '#141b2d',
      plot_bgcolor: '#141b2d',
      font: { color: '#94a3b8', family: 'DM Sans, sans-serif' },
      title: {
        text: title,
        font: { size: 14, color: '#e2e8f0', family: 'DM Sans, sans-serif' },
        x: 0.02,
        xanchor: 'left'
      },
      xaxis: {
        gridcolor: '#1e293b',
        linecolor: '#1e293b',
        tickfont: { color: '#94a3b8', family: 'DM Sans, sans-serif', size: 11 },
        zeroline: false
      },
      yaxis: {
        gridcolor: '#1e293b',
        linecolor: '#1e293b',
        tickfont: { color: '#94a3b8', family: 'Space Mono, monospace', size: 11 },
        zeroline: false
      },
      margin: { t: 48, b: 44, l: 70, r: 16 },
      hovermode: 'closest',
      hoverlabel: {
        bgcolor: '#1e293b',
        bordercolor: '#2a3650',
        font: { family: 'DM Sans, sans-serif', color: '#f1f5f9', size: 13 }
      }
    };
    if (extra) {
      for (var k in extra) {
        if (extra.hasOwnProperty(k)) layout[k] = extra[k];
      }
    }
    return layout;
  }

  /* ── View Switching ── */
  var viewTabs = document.querySelectorAll('.view-tab');

  viewTabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      var view = tab.getAttribute('data-view');
      if (view === activeView) return;
      activeView = view;
      viewTabs.forEach(function(t) {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
      var panelId = 'panel' + view.charAt(0).toUpperCase() + view.slice(1);
      var panel = $(panelId);
      if (panel) panel.classList.add('active');
      renderActivePanel();
    });
    tab.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); tab.click(); }
    });
  });

  /* ── Time Filters ── */
  var presetBtns = document.querySelectorAll('.preset-btn');

  function setPreset(months) {
    activePreset = months;
    presetBtns.forEach(function(b) {
      var m = parseInt(b.getAttribute('data-months'), 10);
      b.classList.toggle('active', m === months);
    });
    if (months === 0) {
      startInput.value = '';
      endInput.value = isoToday();
    } else {
      startInput.value = isoMonthsAgo(months);
      endInput.value = isoToday();
    }
    loadAll();
  }

  presetBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      setPreset(parseInt(btn.getAttribute('data-months'), 10));
    });
    btn.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
    });
  });

  startInput.addEventListener('change', function() { activePreset = null; clearPresetHighlights(); loadAll(); });
  endInput.addEventListener('change', function() { activePreset = null; clearPresetHighlights(); loadAll(); });

  function clearPresetHighlights() {
    presetBtns.forEach(function(b) { b.classList.remove('active'); });
  }

  function getDateParams() {
    var params = '';
    if (startInput.value) params += 'start=' + startInput.value;
    if (endInput.value) params += (params ? '&' : '') + 'end=' + endInput.value;
    return params ? '?' + params : '';
  }

  /* ── Data Loading ── */
  function loadAll() {
    hideError();

    // Set loading states
    var spendVal = $('totalSpendValue');
    var catVal = $('topCategoryValue');
    var txnVal = $('transactionsValue');
    spendVal.textContent = '--';
    spendVal.classList.add('loading-text');
    catVal.textContent = '--';
    catVal.classList.add('loading-text');
    txnVal.textContent = '--';
    txnVal.classList.add('loading-text');
    $('totalSpendSub').textContent = '\u00a0';
    $('topCategorySub').textContent = '\u00a0';
    $('transactionsSub').textContent = '\u00a0';

    // Hide drilldown on reload
    $('txnDrilldown').style.display = 'none';

    var params = getDateParams();

    Promise.all([
      fetch('/api/finance/overview' + params).then(function(r) {
        if (!r.ok) throw new Error('Overview: ' + r.status);
        return r.json();
      }),
      fetch('/api/finance/merchants' + params).then(function(r) {
        if (!r.ok) throw new Error('Merchants: ' + r.status);
        return r.json();
      }),
      fetch('/api/finance/cards' + params).then(function(r) {
        if (!r.ok) throw new Error('Cards: ' + r.status);
        return r.json();
      })
    ]).then(function(results) {
      overviewData = results[0];
      merchantsData = results[1];
      cardsData = results[2];

      updateSyncInfo(overviewData.generated_at);
      updateSummaryCards(overviewData.summary);
      renderActivePanel();
    }).catch(function(err) {
      showError('Failed to load finance data: ' + err.message);
    });
  }

  function updateSyncInfo(ts) {
    if (!ts) { syncInfo.textContent = '--:--'; return; }
    var d = new Date(ts);
    syncInfo.textContent = d.toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
    });
  }

  function updateSummaryCards(summary) {
    if (!summary) return;

    var spendVal = $('totalSpendValue');
    var catVal = $('topCategoryValue');
    var txnVal = $('transactionsValue');

    spendVal.classList.remove('loading-text');
    catVal.classList.remove('loading-text');
    txnVal.classList.remove('loading-text');

    spendVal.textContent = fmtMoney(summary.total_spend);
    $('totalSpendSub').textContent = '';
    var subSpend = $('totalSpendSub');
    var avgSpan = createEl('span', 'mono', fmtMoneyShort(summary.avg_monthly));
    subSpend.appendChild(document.createTextNode('avg '));
    subSpend.appendChild(avgSpan);
    subSpend.appendChild(document.createTextNode(' / mo'));

    catVal.textContent = capitalize(summary.biggest_category || '---');
    var subCat = $('topCategorySub');
    clearChildren(subCat);
    var catAmtSpan = createEl('span', 'mono', fmtMoney(summary.biggest_category_amount));
    subCat.appendChild(catAmtSpan);

    txnVal.textContent = fmtNumber(summary.transaction_count);
    var subTxn = $('transactionsSub');
    if (summary.uncategorized_count) {
      subTxn.textContent = summary.uncategorized_count + ' uncategorized';
      subTxn.style.color = '#ef4444';
    } else {
      subTxn.textContent = 'all categorized';
      subTxn.style.color = '';
    }
  }

  /* ── Panel Rendering ── */
  function renderActivePanel() {
    if (activeView === 'spending') renderSpending();
    else if (activeView === 'merchants') renderMerchants();
    else if (activeView === 'cards') renderCards();
  }

  /* ── Spending Panel ── */
  function renderSpending() {
    if (!overviewData) return;
    renderMonthlyChart();
    renderCategoryDonut();
  }

  function renderMonthlyChart() {
    var el = $('chartMonthly');
    var monthly = overviewData.monthly_spend || [];
    if (monthly.length === 0) {
      clearChildren(el);
      var empty = createEl('div', 'empty-state');
      empty.appendChild(createEl('p', null, 'No spending data in selected range'));
      el.appendChild(empty);
      return;
    }

    var months = monthly.map(function(m) { return m.month; });
    var totals = monthly.map(function(m) { return m.total; });

    Plotly.newPlot(el, [{
      x: months,
      y: totals,
      type: 'bar',
      marker: {
        color: '#10b981',
        opacity: 0.85,
        line: { color: '#10b981', width: 0 }
      },
      hovertemplate: '<b>%{x}</b><br>%{y:$,.2f}<extra></extra>'
    }], baseLayout('Monthly Spend', {
      xaxis: {
        type: 'category',
        gridcolor: '#1e293b',
        linecolor: '#1e293b',
        tickfont: { color: '#94a3b8', family: 'DM Sans, sans-serif', size: 11 },
        zeroline: false
      },
      yaxis: {
        gridcolor: '#1e293b',
        linecolor: '#1e293b',
        tickfont: { color: '#94a3b8', family: 'Space Mono, monospace', size: 11 },
        tickprefix: '$',
        tickformat: ',.0f',
        zeroline: false
      },
      bargap: 0.3
    }), { responsive: true, displayModeBar: false });

    // Click on bar → show transactions for that month
    el.on('plotly_click', function(data) {
      if (!data.points || !data.points[0]) return;
      var month = data.points[0].x;
      showMonthDrilldown(month);
    });
  }

  function renderCategoryDonut() {
    var el = $('chartCategory');
    var cats = overviewData.category_breakdown || [];
    if (cats.length === 0) {
      clearChildren(el);
      var empty = createEl('div', 'empty-state');
      empty.appendChild(createEl('p', null, 'No category data'));
      el.appendChild(empty);
      return;
    }

    var labels = cats.map(function(c) { return capitalize(c.category); });
    var values = cats.map(function(c) { return c.total; });
    var colors = cats.map(function(c) { return getCategoryColor(c.category); });

    // Build hover text with dollar amounts
    var hoverText = cats.map(function(c) {
      return '<b>' + capitalize(c.category) + '</b><br>' + fmtMoney(c.total) + '<br>' + c.count + ' transactions';
    });

    var totalSpend = values.reduce(function(a, b) { return a + b; }, 0);

    Plotly.newPlot(el, [{
      labels: labels,
      values: values,
      type: 'pie',
      hole: 0.45,
      marker: {
        colors: colors,
        line: { color: '#141b2d', width: 2 }
      },
      textposition: 'inside',
      textinfo: 'percent',
      insidetextorientation: 'horizontal',
      textfont: { color: '#f1f5f9', size: 13, family: 'Space Mono, monospace' },
      hovertext: hoverText,
      hoverinfo: 'text',
      sort: false
    }], {
      paper_bgcolor: '#141b2d',
      plot_bgcolor: '#141b2d',
      font: { color: '#94a3b8', family: 'DM Sans, sans-serif' },
      title: {
        text: 'By Category',
        font: { size: 14, color: '#e2e8f0', family: 'DM Sans, sans-serif' },
        x: 0.02,
        xanchor: 'left'
      },
      annotations: [{
        text: fmtMoney(totalSpend),
        x: 0.5,
        y: 0.5,
        font: { size: 18, color: '#f1f5f9', family: 'Space Mono, monospace' },
        showarrow: false
      }],
      margin: { t: 48, b: 10, l: 10, r: 10 },
      showlegend: true,
      legend: {
        orientation: 'h',
        y: -0.1,
        x: 0.5,
        xanchor: 'center',
        font: { color: '#94a3b8', size: 11, family: 'DM Sans, sans-serif' }
      },
      hoverlabel: {
        bgcolor: '#1e293b',
        bordercolor: '#2a3650',
        font: { family: 'DM Sans, sans-serif', color: '#f1f5f9', size: 13 }
      }
    }, { responsive: true, displayModeBar: false });

    // Click on donut slice -> drill into category transactions
    el.on('plotly_click', function(data) {
      if (!data.points || !data.points[0]) return;
      var catName = data.points[0].label;
      showCategoryDrilldown(catName);
    });
  }

  /* ── Batch categorization state ── */
  var pendingOverrides = {};  // { normalized_merchant: { merchant, category } }

  function updateSaveButton() {
    var btn = $('batchSaveBtn');
    var count = Object.keys(pendingOverrides).length;
    if (count === 0) {
      btn.style.display = 'none';
      return;
    }
    btn.style.display = 'inline-flex';
    btn.disabled = false;
    btn.textContent = 'Save ' + count + ' change' + (count > 1 ? 's' : '');
  }

  function saveBatchOverrides() {
    var items = Object.keys(pendingOverrides).map(function(k) { return pendingOverrides[k]; });
    if (items.length === 0) return;
    var btn = $('batchSaveBtn');
    btn.textContent = 'Saving...';
    btn.disabled = true;

    fetch('/api/finance/categorize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ overrides: items })
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.status === 'saved') {
        pendingOverrides = {};
        updateSaveButton();
        loadAll();
      }
    }).catch(function() {
      btn.textContent = 'Error — retry';
      btn.disabled = false;
    });
  }

  function showCategoryDrilldown(category) {
    var wrapper = $('txnDrilldown');
    var title = $('txnDrillTitle');
    var tbody = $('txnDrillBody');
    clearChildren(tbody);
    clearChildren(title);

    // Reset pending overrides for each drilldown open
    pendingOverrides = {};
    updateSaveButton();

    var txns = (overviewData.transactions || []).filter(function(t) {
      return t.category === category;
    });

    // Build title with colored dot
    var dot = createEl('span', 'cat-dot');
    dot.style.backgroundColor = getCategoryColor(category);
    title.appendChild(dot);
    title.appendChild(document.createTextNode(capitalize(category) + ' \u2014 ' + txns.length + ' transactions'));

    wrapper.style.display = 'block';

    var isOther = category === 'Other';
    $('txnDrillActionHeader').textContent = isOther ? 'Reassign' : '';

    txns.forEach(function(t) {
      var tr = document.createElement('tr');

      var tdDate = document.createElement('td');
      tdDate.className = 'td-count';
      tdDate.textContent = t.date;
      tr.appendChild(tdDate);

      var tdDesc = document.createElement('td');
      tdDesc.textContent = t.description || '---';
      if (t.status === 'pending') tdDesc.appendChild(createEl('span', 'pending-tag', 'pending'));
      tr.appendChild(tdDesc);

      var tdAmt = document.createElement('td');
      tdAmt.className = 'td-money';
      tdAmt.textContent = fmtMoney(t.amount);
      tr.appendChild(tdAmt);

      var tdCard = document.createElement('td');
      tdCard.textContent = t.card || '---';
      tr.appendChild(tdCard);

      var tdAction = document.createElement('td');
      if (isOther) {
        var select = document.createElement('select');
        select.style.cssText = 'background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:4px;padding:3px 6px;font-size:0.7rem;cursor:pointer;';
        var defaultOpt = document.createElement('option');
        defaultOpt.value = '';
        defaultOpt.textContent = 'Assign...';
        select.appendChild(defaultOpt);

        ['groceries','dining','shopping','travel','transportation','entertainment','fitness','health','subscriptions','utilities','auto','fuel'].forEach(function(c) {
          var opt = document.createElement('option');
          opt.value = c;
          opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
          select.appendChild(opt);
        });

        (function(merchant, sel, row) {
          sel.addEventListener('change', function() {
            if (!sel.value) {
              delete pendingOverrides[merchant];
              sel.style.borderColor = '#334155';
              row.style.background = '';
            } else {
              pendingOverrides[merchant] = { merchant: merchant, category: sel.value };
              sel.style.borderColor = '#10b981';
              row.style.background = 'rgba(16,185,129,0.06)';
            }
            updateSaveButton();
          });
        })(t.description, select, tr);

        tdAction.appendChild(select);
      }
      tr.appendChild(tdAction);

      tbody.appendChild(tr);
    });

    $('txnDrillClose').onclick = function() {
      wrapper.style.display = 'none';
      pendingOverrides = {};
      updateSaveButton();
    };
    $('txnDrillClose').onkeydown = function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); $('txnDrillClose').onclick(); }
    };

    // Scroll into view
    wrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showMerchantDrilldown(merchant) {
    var wrapper = $('merchantDrill');
    var title = $('merchantDrillTitle');
    var tbody = $('merchantDrillBody');
    clearChildren(tbody);

    var txns = merchant.transactions || [];
    title.textContent = merchant.name + ' — ' + txns.length + ' transactions';
    wrapper.style.display = 'block';

    txns.forEach(function(t) {
      var tr = document.createElement('tr');
      tr.appendChild(createEl('td', null, t.date));
      var tdDesc = createEl('td', null, t.description || '---');
      if (t.status === 'pending') tdDesc.appendChild(createEl('span', 'pending-tag', 'pending'));
      tr.appendChild(tdDesc);
      var tdAmt = createEl('td', 'td-money', fmtMoney(t.amount));
      tr.appendChild(tdAmt);
      tr.appendChild(createEl('td', null, t.card || '---'));
      tbody.appendChild(tr);
    });

    $('merchantDrillClose').onclick = function() { wrapper.style.display = 'none'; };
    $('merchantDrillClose').onkeydown = function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); wrapper.style.display = 'none'; }
    };
    wrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showMonthDrilldown(month) {
    // Plotly may pass "2026-01-01" or "2026-01" — normalize to YYYY-MM
    var monthKey = month.slice(0, 7);
    var txns = (overviewData.transactions || []).filter(function(t) {
      return t.date.slice(0, 7) === monthKey;
    });
    // Reuse the spending drilldown panel
    var wrapper = $('txnDrilldown');
    var title = $('txnDrillTitle');
    var tbody = $('txnDrillBody');
    clearChildren(tbody);

    var MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var parts = monthKey.split('-');
    var monthLabel = MONTH_NAMES[parseInt(parts[1], 10) - 1] + ' ' + parts[0];
    title.textContent = monthLabel + ' — ' + txns.length + ' transactions';
    wrapper.style.display = 'block';

    txns.forEach(function(t) {
      var tr = document.createElement('tr');
      tr.appendChild(createEl('td', null, t.date));
      var tdDesc = createEl('td', null, t.description || '---');
      if (t.status === 'pending') tdDesc.appendChild(createEl('span', 'pending-tag', 'pending'));
      tr.appendChild(tdDesc);
      var tdAmt = createEl('td', 'td-money', fmtMoney(t.amount));
      tr.appendChild(tdAmt);
      tr.appendChild(createEl('td', null, t.card || '---'));
      tbody.appendChild(tr);
    });

    $('txnDrillClose').onclick = function() { wrapper.style.display = 'none'; };
    $('txnDrillClose').onkeydown = function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); wrapper.style.display = 'none'; }
    };
    wrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* ── Merchants Panel ── */
  function renderMerchants() {
    var body = $('merchantsBody');
    clearChildren(body);

    if (!merchantsData || !merchantsData.merchants || merchantsData.merchants.length === 0) {
      var tr = document.createElement('tr');
      var td = document.createElement('td');
      td.setAttribute('colspan', '5');
      td.style.textAlign = 'center';
      td.style.padding = '48px 16px';
      td.style.color = '#64748b';
      td.textContent = 'No merchant data in selected range';
      tr.appendChild(td);
      body.appendChild(tr);
      return;
    }

    var merchants = merchantsData.merchants.slice(0, 25);
    merchants.forEach(function(m, i) {
      var tr = document.createElement('tr');
      tr.style.cursor = 'pointer';

      var tdRank = document.createElement('td');
      tdRank.className = 'td-rank';
      tdRank.textContent = String(i + 1);
      tr.appendChild(tdRank);

      var tdName = document.createElement('td');
      tdName.style.fontWeight = '500';
      tdName.textContent = m.name || '---';
      tr.appendChild(tdName);

      var tdSpend = document.createElement('td');
      tdSpend.className = 'td-money';
      tdSpend.textContent = fmtMoney(m.total_spend);
      tr.appendChild(tdSpend);

      var tdCount = document.createElement('td');
      tdCount.className = 'td-count';
      tdCount.textContent = fmtNumber(m.transaction_count);
      tr.appendChild(tdCount);

      var tdAvg = document.createElement('td');
      tdAvg.className = 'td-count';
      tdAvg.textContent = fmtMoney(m.avg_transaction);
      tr.appendChild(tdAvg);

      // Click to drill down into merchant transactions
      (function(merchant) {
        tr.addEventListener('click', function() {
          showMerchantDrilldown(merchant);
        });
      })(m);

      body.appendChild(tr);
    });
  }

  /* ── Cards Panel ── */
  function renderCards() {
    var grid = $('cardsGrid');
    clearChildren(grid);

    if (!cardsData || !cardsData.cards || cardsData.cards.length === 0) {
      var empty = createEl('div', 'empty-state');
      empty.appendChild(createEl('p', null, 'No card data in selected range'));
      grid.appendChild(empty);
      return;
    }

    cardsData.cards.forEach(function(card, i) {
      var accentColor = CARD_ACCENT_COLORS[i % CARD_ACCENT_COLORS.length];

      var block = createEl('div', 'card-block');
      block.style.borderColor = 'transparent';

      var inner = createEl('div', 'card-block-inner');

      // Header row: name + last 4
      var header = createEl('div', 'cb-header');
      var nameEl = createEl('div', 'cb-name', card.name || 'Card');
      nameEl.style.color = accentColor;
      header.appendChild(nameEl);
      if (card.last_four) {
        var l4 = createEl('span', 'cb-last4', '\u2022\u2022\u2022\u2022 ' + card.last_four);
        header.appendChild(l4);
      }
      inner.appendChild(header);

      // Spend
      var spend = createEl('div', 'cb-spend', fmtMoney(card.total_spend));
      inner.appendChild(spend);

      // Meta row
      var meta = createEl('div', 'cb-meta');
      var txnStat = createEl('div', 'cb-stat');
      txnStat.appendChild(createEl('strong', null, fmtNumber(card.transaction_count)));
      txnStat.appendChild(document.createTextNode(' transactions'));
      meta.appendChild(txnStat);
      inner.appendChild(meta);

      // Top category
      if (card.top_category) {
        var topCat = createEl('div', 'cb-top-cat');
        var catDot = createEl('span', 'cb-cat-dot');
        catDot.style.backgroundColor = getCategoryColor(card.top_category);
        topCat.appendChild(catDot);
        var catLabel = capitalize(card.top_category);
        var catAmt = card.top_category_amount ? ' \u2014 ' + fmtMoney(card.top_category_amount) : '';
        topCat.appendChild(document.createTextNode(catLabel + catAmt));
        inner.appendChild(topCat);
      }

      block.appendChild(inner);

      // Transaction list (hidden)
      var txnList = createEl('div', 'cb-txn-list');
      var cardTxns = card.transactions || [];
      cardTxns.forEach(function(t) {
        var row = createEl('div', 'cb-txn-row');
        row.appendChild(createEl('span', 'cb-txn-date', t.date));
        var desc = createEl('span', 'cb-txn-desc', t.description || '---');
        if (t.status === 'pending') desc.appendChild(createEl('span', 'pending-tag', 'pending'));
        row.appendChild(desc);
        row.appendChild(createEl('span', 'cb-txn-amt', fmtMoney(t.amount)));
        txnList.appendChild(row);
      });
      block.appendChild(txnList);

      // Toggle button
      var toggleBtn = createEl('button', 'cb-toggle');
      toggleBtn.setAttribute('tabindex', '0');
      toggleBtn.setAttribute('aria-expanded', 'false');
      toggleBtn.appendChild(document.createTextNode('View transactions '));
      var arrow = createEl('span', 'cb-toggle-arrow', '\u25BC');
      toggleBtn.appendChild(arrow);
      block.appendChild(toggleBtn);

      // Toggle logic
      (function(btn, list) {
        var open = false;
        function toggle() {
          open = !open;
          if (open) {
            list.style.maxHeight = '300px';
            list.classList.add('open');
            btn.classList.add('open');
            btn.setAttribute('aria-expanded', 'true');
            while (btn.firstChild) btn.removeChild(btn.firstChild);
            btn.appendChild(document.createTextNode('Hide transactions '));
            var a = createEl('span', 'cb-toggle-arrow', '\u25BC');
            btn.appendChild(a);
          } else {
            list.style.maxHeight = '0';
            list.classList.remove('open');
            btn.classList.remove('open');
            btn.setAttribute('aria-expanded', 'false');
            while (btn.firstChild) btn.removeChild(btn.firstChild);
            btn.appendChild(document.createTextNode('View transactions '));
            var a2 = createEl('span', 'cb-toggle-arrow', '\u25BC');
            btn.appendChild(a2);
          }
        }
        btn.addEventListener('click', toggle);
        btn.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
        });
      })(toggleBtn, txnList);

      // Hover border accent
      block.addEventListener('mouseenter', function() { block.style.borderColor = accentColor + '40'; });
      block.addEventListener('mouseleave', function() { block.style.borderColor = 'transparent'; });

      grid.appendChild(block);
    });
  }

  /* ── Retry ── */
  $('batchSaveBtn').addEventListener('click', saveBatchOverrides);

  retryBtn.addEventListener('click', function() { loadAll(); });
  retryBtn.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); loadAll(); }
  });

  /* ── Init ── */
  setPreset(1);

})();
</script>
</body>
</html>
