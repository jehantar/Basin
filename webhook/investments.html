<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basin — Investments</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2338bdf8'/%3E%3Cstop offset='100%25' stop-color='%232563eb'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='url(%23g)'/%3E%3Cpath d='M16 6c-4 0-7 3-7 5 0 3 2.5 4.5 4 6s2 3.5 3 6c1-2.5 1.5-4.5 3-6s4-3 4-6c0-2-3-5-7-5z' fill='white' opacity='0.9'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --base: #0a0f1a;
    --surface: #141b2d;
    --surface-hover: #1a2340;
    --border: #1e293b;
    --border-light: #2a3650;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #10b981;
    --accent-glow: rgba(16, 185, 129, 0.15);
    --alert: #ef4444;
    --nav-active: #10b981;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--base);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px 48px;
  }

  a { color: var(--accent); text-decoration: none; }

  /* ── Top Navigation ── */
  .top-nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 32px;
    background: linear-gradient(180deg, rgba(10,15,26,0.95) 0%, rgba(10,15,26,0.8) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-tab {
    padding: 16px 28px;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: color 0.25s, border-color 0.25s;
  }
  .nav-tab:hover { color: var(--text-secondary); }
  .nav-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .nav-tab.active {
    color: var(--text-primary);
    border-bottom-color: var(--nav-active);
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-top: 32px;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--accent); }
  .header .sync-info {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  /* ── Stale Data Banner ── */
  .stale-banner {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: 10px;
    padding: 10px 20px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: #fbbf24;
  }
  .stale-banner.visible { display: flex; }

  /* ── Summary Cards ── */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 28px;
  }
  .sector-card::before { background: #a78bfa; }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
    opacity: 0.8;
  }
  .summary-card:hover {
    border-color: var(--border-light);
    transform: translateY(-1px);
  }
  .summary-card.tracked::before { background: #3b82f6; }
  .summary-card.best::before { background: var(--accent); }
  .summary-card.worst::before { background: var(--alert); }

  .sc-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .summary-card.tracked .sc-label { color: #3b82f6; }
  .summary-card.best .sc-label { color: var(--accent); }
  .summary-card.worst .sc-label { color: var(--alert); }

  .sc-value {
    font-family: var(--mono);
    font-size: 2.25rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .sc-sub {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .sc-sub .mono {
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  /* ── Controls Row ── */
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .controls-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .group-select {
    font-family: var(--sans);
    background: var(--surface);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .group-select:focus { border-color: var(--accent); }
  .group-select option { background: var(--surface); color: var(--text-primary); }

  .stock-selector-btn {
    font-family: var(--sans);
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .stock-selector-btn:hover { color: var(--text-secondary); border-color: var(--border-light); }
  .stock-selector-btn.open { border-color: var(--accent); color: var(--accent); }

  .time-filters {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .preset-btn {
    font-family: var(--mono);
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.75rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
    letter-spacing: 0.02em;
  }
  .preset-btn:hover { color: var(--text-secondary); border-color: var(--border-light); }
  .preset-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .preset-btn.active {
    background: rgba(16,185,129,0.12);
    color: var(--accent);
    border-color: var(--accent);
  }
  .filters-sep {
    color: var(--border-light);
    margin: 0 4px;
    font-size: 0.85rem;
    user-select: none;
  }
  .date-input {
    font-family: var(--mono);
    background: var(--base);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .date-input:focus { border-color: var(--accent); }

  /* ── Stock Selector Panel ── */
  .stock-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    max-height: 240px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;
  }
  .stock-panel.open { display: block; }
  .stock-panel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 6px;
  }
  .stock-check {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
    color: var(--text-secondary);
    transition: background 0.15s;
  }
  .stock-check:hover { background: rgba(255,255,255,0.03); }
  .stock-check input { accent-color: var(--accent); cursor: pointer; }
  .stock-check .ticker-label {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.75rem;
    color: var(--text-primary);
  }

  /* ── Chart Panel ── */
  .chart-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
  }
  .chart-mode-toggle {
    display: flex;
    gap: 4px;
    background: var(--base);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .chart-mode-btn {
    font-family: var(--sans);
    background: transparent;
    color: var(--text-muted);
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .chart-mode-btn:hover { color: var(--text-secondary); }
  .chart-mode-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .chart-meta {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-muted);
    padding: 0 0 8px 4px;
    min-height: 1.2em;
  }
  .chart-area { width: 100%; min-height: 420px; }

  /* ── Drilldown Panel ── */
  .drilldown-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    display: none;
    animation: slideDown 0.3s ease;
  }
  .drilldown-panel.open { display: block; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .drilldown-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .drilldown-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-primary);
  }
  .drilldown-close {
    font-family: var(--sans);
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .drilldown-close:hover { background: rgba(255,255,255,0.08); color: var(--text-secondary); }

  /* ── Data Table ── */
  .table-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .table-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .table-ctrl-btn {
    font-family: var(--sans);
    background: rgba(255,255,255,0.04);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .table-ctrl-btn:hover { color: var(--text-secondary); border-color: var(--border-light); background: rgba(255,255,255,0.06); }
  .table-ctrl-count {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-left: 8px;
  }

  .table-search {
    font-family: var(--mono);
    background: var(--base);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.75rem;
    outline: none;
    margin-left: auto;
    width: 160px;
    transition: border-color 0.2s, width 0.2s;
  }
  .table-search:focus { border-color: var(--accent); width: 200px; }
  .table-search::placeholder { color: var(--text-muted); }

  .table-wrapper {
    max-height: 600px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;
  }
  .table-wrapper::-webkit-scrollbar { width: 6px; }
  .table-wrapper::-webkit-scrollbar-track { background: transparent; }
  .table-wrapper::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .data-table thead { position: sticky; top: 0; z-index: 2; }
  .data-table th {
    text-align: left;
    color: var(--text-muted);
    font-weight: 600;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }
  .data-table th:hover { color: var(--text-secondary); }
  .data-table th.sorted { color: var(--accent); }
  .data-table th .sort-arrow { font-size: 0.6rem; margin-left: 4px; }

  .data-table td {
    padding: 10px 16px;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(30,41,59,0.5);
  }
  .data-table tbody tr { transition: background 0.15s; cursor: pointer; }
  .data-table tbody tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
  .data-table tbody tr:hover td { background: rgba(16,185,129,0.04); }

  .td-ticker {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--text-primary);
  }
  .td-money {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.8rem;
  }
  .td-pct {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.8rem;
  }
  .td-pct.positive { color: var(--accent); }
  .td-pct.negative { color: var(--alert); }

  /* ── Error Banner ── */
  .error-banner {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 12px;
  }
  .error-banner.visible { display: flex; }
  .error-banner .error-icon {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--alert);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 0.7rem; font-weight: 700;
  }
  .error-banner .error-msg { flex: 1; color: #fca5a5; font-size: 0.82rem; }
  .error-banner .retry-btn {
    font-family: var(--sans);
    background: rgba(239,68,68,0.15);
    color: #fca5a5;
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 6px;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .error-banner .retry-btn:hover { background: rgba(239,68,68,0.25); }

  /* ── View Tabs ── */
  .view-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .view-tab {
    font-family: var(--sans);
    background: transparent;
    color: var(--text-muted);
    border: none;
    border-radius: 7px;
    padding: 8px 20px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
    letter-spacing: 0.02em;
  }
  .view-tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
  .view-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(16,185,129,0.25);
  }

  /* ── Group Comparison ── */
  .compare-panel { display: none; }
  .compare-panel.active { display: block; }
  .stocks-view { display: block; }
  .stocks-view.hidden { display: none; }

  .compare-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 24px;
    margin-bottom: 24px;
  }
  .compare-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    min-height: 400px;
  }
  .compare-card-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .compare-card-meta {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .compare-summary-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }
  .compare-summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
  }
  .compare-summary-label {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .compare-summary-value {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.1;
  }
  .compare-summary-detail {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Heatmap ── */
  .heatmap-panel { display: none; }
  .heatmap-panel.active { display: block; }
  .heatmap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .heatmap-tile {
    border-radius: 12px;
    padding: 16px 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    text-align: center;
    border: 1px solid transparent;
  }
  .heatmap-tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    border-color: var(--border-light);
  }
  .heatmap-ticker {
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .heatmap-return {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
  }
  .heatmap-name {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  @media (max-width: 900px) {
    .compare-grid { grid-template-columns: 1fr; }
    .compare-summary-row { grid-template-columns: 1fr; }
    .heatmap-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  }

  /* ── Loading Pulse ── */
  .loading-text { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .page-container { padding: 0 16px 32px; }
    .top-nav { padding: 0 16px; }
    .summary-cards { grid-template-columns: 1fr 1fr; }
    .controls-row { flex-direction: column; align-items: stretch; }
    .time-filters { flex-wrap: wrap; justify-content: center; }
    .chart-panel, .drilldown-panel, .table-panel { border-radius: 12px; }
    .sc-value { font-size: 1.8rem; }
    .stock-panel-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }
  @media (max-width: 500px) {
    .nav-tab { padding: 12px 16px; font-size: 0.78rem; }
    .header h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<nav class="top-nav">
  <a href="/dashboard/fitness" class="nav-tab">Fitness</a>
  <a href="/dashboard/finance" class="nav-tab">Finance</a>
  <a href="/dashboard/investments" class="nav-tab active">Investments</a>
  <a href="/dashboard/system" class="nav-tab">System</a>
</nav>

<div class="page-container">

  <div class="header">
    <h1>Basin <span>/</span> Investments</h1>
    <span class="sync-info" id="syncInfo">--:--</span>
  </div>

  <div class="stale-banner" id="staleBanner">
    Data may be stale — last price update: <strong id="staleDate">--</strong>
  </div>

  <div class="error-banner" id="errorBanner">
    <div class="error-icon">!</div>
    <span class="error-msg" id="errorMsg"></span>
    <button class="retry-btn" id="retryBtn">Retry</button>
  </div>

  <div class="summary-cards">
    <div class="summary-card tracked">
      <div class="sc-label">Stocks Tracked</div>
      <div class="sc-value loading-text" id="trackedValue">--</div>
      <div class="sc-sub" id="trackedSub">&nbsp;</div>
    </div>
    <div class="summary-card best">
      <div class="sc-label">Best Performer</div>
      <div class="sc-value loading-text" id="bestValue">--</div>
      <div class="sc-sub" id="bestSub">&nbsp;</div>
    </div>
    <div class="summary-card worst">
      <div class="sc-label">Worst Performer</div>
      <div class="sc-value loading-text" id="worstValue">--</div>
      <div class="sc-sub" id="worstSub">&nbsp;</div>
    </div>
    <div class="summary-card sector-card">
      <div class="sc-label" style="color: #a78bfa;">Sectors</div>
      <div id="sectorDonut" style="width:100%;height:160px;"></div>
    </div>
  </div>

  <div class="view-tabs" id="viewTabs">
    <button class="view-tab active" data-view="stocks">Stocks</button>
    <button class="view-tab" data-view="compare">Compare Groups</button>
    <button class="view-tab" data-view="heatmap">Heatmap</button>
  </div>

  <div class="controls-row">
    <div class="controls-left">
      <select class="group-select" id="groupSelect">
        <option value="">All Stocks</option>
      </select>
      <button class="stock-selector-btn" id="stockSelectorBtn">Select Stocks</button>
    </div>
    <div class="time-filters">
      <button class="preset-btn" data-preset="1M">1M</button>
      <button class="preset-btn" data-preset="3M">3M</button>
      <button class="preset-btn" data-preset="6M">6M</button>
      <button class="preset-btn" data-preset="YTD">YTD</button>
      <button class="preset-btn" data-preset="1Y">1Y</button>
      <button class="preset-btn" data-preset="3Y">3Y</button>
      <button class="preset-btn" data-preset="5Y">5Y</button>
      <button class="preset-btn" data-preset="All">All</button>
      <span class="filters-sep">|</span>
      <input type="date" class="date-input" id="startDate" aria-label="Start date">
      <span class="filters-sep">&ndash;</span>
      <input type="date" class="date-input" id="endDate" aria-label="End date">
    </div>
  </div>

  <!-- ── Stocks View ── -->
  <div class="stocks-view" id="stocksView">
    <div class="chart-panel">
      <div class="chart-header">
        <div class="chart-meta" id="chartMeta"></div>
        <div class="chart-mode-toggle">
          <button class="chart-mode-btn active" data-mode="absolute">Absolute</button>
          <button class="chart-mode-btn" data-mode="vs-spy">vs S&P 500</button>
        </div>
      </div>
      <div class="chart-area" id="chartOverlay"></div>
    </div>

    <div class="drilldown-panel" id="drilldownPanel">
      <div class="drilldown-header">
        <span class="drilldown-title" id="drilldownTitle"></span>
        <button class="drilldown-close" id="drilldownClose">Close</button>
      </div>
      <div class="chart-area" id="chartDrilldown"></div>
    </div>

    <div class="stock-panel" id="stockPanel">
      <div class="stock-panel-grid" id="stockPanelGrid"></div>
    </div>

    <div class="table-panel">
      <div class="table-controls">
        <button class="table-ctrl-btn" id="selectAllBtn">Select All</button>
        <button class="table-ctrl-btn" id="unselectAllBtn">Unselect All</button>
        <span class="table-ctrl-count" id="selectionCount"></span>
        <input type="text" class="table-search" id="tableSearch" placeholder="Filter stocks..." aria-label="Filter stocks">
      </div>
      <div class="table-wrapper">
        <table class="data-table" id="stockTable">
          <thead>
            <tr>
              <th style="width:40px"></th>
              <th data-col="ticker">Ticker</th>
              <th data-col="name">Name</th>
              <th data-col="current_price">Price</th>
              <th data-col="period_return_pct">% Return</th>
              <th data-col="cagr_pct" title="Compound Annual Growth Rate (shown for periods >= 1 year)">CAGR</th>
              <th data-col="high_52w">52W High</th>
              <th data-col="low_52w">52W Low</th>
            </tr>
          </thead>
          <tbody id="stockTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── Group Comparison View ── -->
  <div class="compare-panel" id="comparePanel">
    <div class="compare-summary-row" id="compareSummaryRow"></div>
    <div class="compare-grid" id="compareGrid"></div>
  </div>

  <!-- ── Heatmap View ── -->
  <div class="heatmap-panel" id="heatmapPanel">
    <div class="heatmap-grid" id="heatmapGrid"></div>
  </div>

</div>

<script>
(function() {
  'use strict';

  var STOCK_COLORS = [
    '#10b981', '#3b82f6', '#f59e0b', '#a78bfa', '#ec4899',
    '#06b6d4', '#f97316', '#8b5cf6', '#14b8a6', '#ef4444',
    '#84cc16', '#e879f9', '#22d3ee', '#fb923c', '#818cf8'
  ];

  var GROUP_COLORS = {
    'Brokerage': '#3b82f6',
    'IRA': '#f59e0b',
    'Parth': '#a78bfa'
  };
  var GROUP_COLOR_LIST = ['#3b82f6', '#f59e0b', '#a78bfa', '#ec4899', '#06b6d4', '#10b981'];

  /* ── State ── */
  var watchlistData = null;
  var pricesData = null;
  var allTickers = [];
  var selectedTickers = [];
  var selectedGroup = '';
  var activePreset = '1Y';
  var activeView = 'stocks';
  var chartMode = 'absolute'; // 'absolute' or 'vs-spy'
  var drilldownTicker = null;
  var sortCol = 'period_return_pct';
  var sortDir = 'desc';

  /* ── DOM helpers ── */
  function $(id) { return document.getElementById(id); }

  function clearChildren(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function createEl(tag, className, text) {
    var el = document.createElement(tag);
    if (className) el.className = className;
    if (text !== undefined && text !== null) el.textContent = text;
    return el;
  }

  /* ── Formatters ── */
  function fmtPrice(n) {
    if (n == null) return '--';
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtPct(n) {
    if (n == null) return '--';
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  }

  /* ── Date presets ── */
  function presetToRange(preset) {
    var end = new Date();
    var start = new Date();
    switch (preset) {
      case '1M': start.setMonth(start.getMonth() - 1); break;
      case '3M': start.setMonth(start.getMonth() - 3); break;
      case '6M': start.setMonth(start.getMonth() - 6); break;
      case 'YTD': start = new Date(end.getFullYear(), 0, 1); break;
      case '1Y': start.setFullYear(start.getFullYear() - 1); break;
      case '3Y': start.setFullYear(start.getFullYear() - 3); break;
      case '5Y': start.setFullYear(start.getFullYear() - 5); break;
      case 'All': start.setFullYear(start.getFullYear() - 10); break;
    }
    return {
      start: start.toISOString().slice(0, 10),
      end: end.toISOString().slice(0, 10)
    };
  }

  /* ── Plotly layout ── */
  function baseLayout(title, extra) {
    var layout = {
      paper_bgcolor: '#141b2d',
      plot_bgcolor: '#141b2d',
      font: { color: '#94a3b8', family: 'DM Sans, sans-serif' },
      title: {
        text: title,
        font: { size: 14, color: '#e2e8f0', family: 'DM Sans, sans-serif' },
        x: 0.02, xanchor: 'left'
      },
      xaxis: {
        gridcolor: '#1e293b', linecolor: '#1e293b',
        tickfont: { color: '#94a3b8', family: 'DM Sans, sans-serif', size: 11 },
        zeroline: false
      },
      yaxis: {
        gridcolor: '#1e293b', linecolor: '#1e293b',
        tickfont: { color: '#94a3b8', family: 'Space Mono, monospace', size: 11 },
        zeroline: false
      },
      margin: { t: 48, b: 44, l: 70, r: 16 },
      hovermode: 'x unified',
      hoverlabel: {
        bgcolor: '#1e293b', bordercolor: '#2a3650',
        font: { family: 'DM Sans, sans-serif', color: '#f1f5f9', size: 13 }
      },
      legend: {
        orientation: 'h', y: -0.15, x: 0.5, xanchor: 'center',
        font: { color: '#94a3b8', size: 11, family: 'DM Sans, sans-serif' }
      }
    };
    if (extra) { for (var k in extra) { if (extra.hasOwnProperty(k)) layout[k] = extra[k]; } }
    return layout;
  }

  /* ── Error handling ── */
  function showError(msg) {
    $('errorMsg').textContent = msg;
    $('errorBanner').classList.add('visible');
  }
  function hideError() { $('errorBanner').classList.remove('visible'); }

  /* ── Stale data banner ── */
  function checkStaleness(freshness) {
    if (!freshness || !freshness.last_price_date) return;
    var lastDate = new Date(freshness.last_price_date);
    var now = new Date();
    var diffDays = Math.floor((now - lastDate) / (1000 * 60 * 60 * 24));
    if (diffDays > 3) {
      $('staleDate').textContent = freshness.last_price_date;
      $('staleBanner').classList.add('visible');
    } else {
      $('staleBanner').classList.remove('visible');
    }
  }

  /* ── DOM refs ── */
  var startInput = $('startDate');
  var endInput = $('endDate');

  /* ── Time Filters ── */
  var presetBtns = document.querySelectorAll('.preset-btn');

  function setPreset(preset) {
    activePreset = preset;
    presetBtns.forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-preset') === preset);
    });
    var range = presetToRange(preset);
    startInput.value = range.start;
    endInput.value = range.end;
    loadAll();
  }

  presetBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      setPreset(btn.getAttribute('data-preset'));
    });
  });

  startInput.addEventListener('change', function() {
    activePreset = null;
    presetBtns.forEach(function(b) { b.classList.remove('active'); });
    loadAll();
  });
  endInput.addEventListener('change', function() {
    activePreset = null;
    presetBtns.forEach(function(b) { b.classList.remove('active'); });
    loadAll();
  });

  function getDateParams() {
    var params = '';
    if (startInput.value) params += 'start=' + startInput.value;
    if (endInput.value) params += (params ? '&' : '') + 'end=' + endInput.value;
    return params ? '?' + params : '';
  }

  /* ── Group selector ── */
  var groupSelect = $('groupSelect');
  groupSelect.addEventListener('change', function() {
    selectedGroup = groupSelect.value;
    if (selectedGroup) {
      var groups = watchlistData ? watchlistData.groups : [];
      var groupObj = groups.find(function(g) { return String(g.id) === selectedGroup; });
      if (groupObj) {
        selectedTickers = groupObj.tickers.slice();
        updateCheckboxes();
      }
    } else {
      selectedTickers = allTickers.slice();
      updateCheckboxes();
    }
    renderTable();
    loadPricesAndRender();
  });

  /* ── Stock selector panel ── */
  var stockSelectorBtn = $('stockSelectorBtn');
  var stockPanel = $('stockPanel');

  stockSelectorBtn.addEventListener('click', function() {
    stockPanel.classList.toggle('open');
    stockSelectorBtn.classList.toggle('open');
    stockSelectorBtn.textContent = stockPanel.classList.contains('open') ? 'Hide Stocks' : 'Select Stocks';
  });

  function buildCheckboxes() {
    var grid = $('stockPanelGrid');
    clearChildren(grid);
    allTickers.forEach(function(ticker) {
      var label = createEl('label', 'stock-check');
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = ticker;
      cb.checked = selectedTickers.indexOf(ticker) !== -1;
      cb.addEventListener('change', function() {
        if (cb.checked) {
          if (selectedTickers.indexOf(ticker) === -1) selectedTickers.push(ticker);
        } else {
          selectedTickers = selectedTickers.filter(function(t) { return t !== ticker; });
        }
        selectedGroup = '';
        groupSelect.value = '';
        renderTable();
        loadPricesAndRender();
      });
      var tickerSpan = createEl('span', 'ticker-label', ticker);
      label.appendChild(cb);
      label.appendChild(tickerSpan);
      grid.appendChild(label);
    });
  }

  function updateCheckboxes() {
    var cbs = stockPanel.querySelectorAll('input[type=checkbox]');
    cbs.forEach(function(cb) {
      cb.checked = selectedTickers.indexOf(cb.value) !== -1;
    });
  }

  /* ── Drilldown ── */
  $('drilldownClose').addEventListener('click', function() {
    drilldownTicker = null;
    $('drilldownPanel').classList.remove('open');
  });

  function showDrilldown(ticker) {
    drilldownTicker = ticker;
    $('drilldownTitle').textContent = ticker + ' — Price History';
    $('drilldownPanel').classList.add('open');

    var params = getDateParams();
    params += (params ? '&' : '?') + 'tickers=' + encodeURIComponent(ticker) + '&normalize=false';

    fetch('/api/investments/prices' + params)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var series = data.series[ticker];
        if (!series) return;

        Plotly.newPlot($('chartDrilldown'), [{
          x: series.dates,
          y: series.values,
          type: 'scatter',
          mode: 'lines',
          line: { color: '#3b82f6', width: 2 },
          fill: 'tozeroy',
          fillcolor: 'rgba(59,130,246,0.08)',
          hovertemplate: '<b>' + ticker + '</b><br>%{x}<br>$%{y:,.2f}<extra></extra>'
        }], baseLayout(ticker, {
          yaxis: {
            gridcolor: '#1e293b', linecolor: '#1e293b',
            tickfont: { color: '#94a3b8', family: 'Space Mono, monospace', size: 11 },
            tickprefix: '$', tickformat: ',.2f', zeroline: false
          },
          hovermode: 'closest'
        }), { responsive: true, displayModeBar: false });

        $('drilldownPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
  }

  /* ── Retry button ── */
  $('retryBtn').addEventListener('click', function() { loadAll(); });

  /* ── Data loading ── */
  function loadAll() {
    hideError();

    ['trackedValue', 'bestValue', 'worstValue'].forEach(function(id) {
      var el = $(id);
      el.textContent = '--';
      el.style.color = '';
      el.classList.add('loading-text');
    });
    ['bestSub', 'worstSub'].forEach(function(id) {
      $(id).textContent = '\u00a0';
      $(id).style.color = '';
    });

    var params = getDateParams();

    fetch('/api/investments/watchlist' + params)
      .then(function(r) {
        if (!r.ok) throw new Error('Watchlist: ' + r.status);
        return r.json();
      })
      .then(function(data) {
        watchlistData = data;

        if (data.generated_at) {
          var d = new Date(data.generated_at);
          $('syncInfo').textContent = d.toLocaleString('en-US', {
            month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
          });
        }

        checkStaleness(data.data_freshness);

        allTickers = data.stocks.map(function(s) { return s.ticker; }).sort();
        if (selectedTickers.length === 0) {
          selectedTickers = allTickers.slice();
        }

        // Populate groups dropdown
        clearChildren(groupSelect);
        var allOpt = createEl('option', null, 'All Stocks');
        allOpt.value = '';
        groupSelect.appendChild(allOpt);
        (data.groups || []).forEach(function(g) {
          var opt = createEl('option', null, g.name + ' (' + g.tickers.length + ')');
          opt.value = g.id;
          groupSelect.appendChild(opt);
        });
        if (selectedGroup) groupSelect.value = selectedGroup;

        buildCheckboxes();
        updateSummaryCards(data.stocks);
        renderTable();
        loadPricesAndRender();

        // Re-render active non-stocks view
        if (activeView === 'compare') renderGroupComparison();
        if (activeView === 'heatmap') renderHeatmap();
      })
      .catch(function(err) {
        showError('Failed to load investment data: ' + err.message);
      });
  }

  function loadPricesAndRender() {
    if (selectedTickers.length === 0) {
      Plotly.purge($('chartOverlay'));
      return;
    }

    // Always include benchmarks so they appear regardless of group/selection
    var benchmarkTickers = [];
    if (watchlistData && watchlistData.stocks) {
      watchlistData.stocks.forEach(function(s) {
        if (s.is_benchmark && selectedTickers.indexOf(s.ticker) === -1) {
          benchmarkTickers.push(s.ticker);
        }
      });
    }
    var allRequestTickers = selectedTickers.concat(benchmarkTickers);

    var params = getDateParams();
    params += (params ? '&' : '?') + 'tickers=' + allRequestTickers.join(',') + '&normalize=true';

    fetch('/api/investments/prices' + params)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        pricesData = data;
        renderOverlayChart();
      });
  }

  /* ── Summary Cards ── */
  function updateSummaryCards(stocks) {
    ['trackedValue', 'bestValue', 'worstValue'].forEach(function(id) {
      $(id).classList.remove('loading-text');
    });

    // Filter to currently selected tickers so cards stay consistent with table/chart
    var visible = stocks.filter(function(s) {
      return selectedTickers.indexOf(s.ticker) !== -1;
    });

    $('trackedValue').textContent = visible.length;
    $('trackedSub').textContent = visible.length === stocks.length ? 'active in watchlist' : 'of ' + stocks.length + ' selected';

    if (visible.length === 0) {
      $('bestValue').textContent = '--';
      $('worstValue').textContent = '--';
      return;
    }

    var sorted = visible.slice().sort(function(a, b) { return b.period_return_pct - a.period_return_pct; });
    var best = sorted[0];
    var worst = sorted[sorted.length - 1];

    $('bestValue').textContent = best.ticker;
    $('bestValue').style.color = '#10b981';
    var bestSubEl = $('bestSub');
    clearChildren(bestSubEl);
    bestSubEl.appendChild(createEl('span', 'mono', fmtPct(best.period_return_pct)));
    bestSubEl.style.color = '#10b981';

    $('worstValue').textContent = worst.ticker;
    $('worstValue').style.color = '#ef4444';
    var worstSubEl = $('worstSub');
    clearChildren(worstSubEl);
    worstSubEl.appendChild(createEl('span', 'mono', fmtPct(worst.period_return_pct)));
    worstSubEl.style.color = '#ef4444';
  }

  /* ── Sector Donut ── */
  var SECTOR_COLORS = {
    'Technology': '#3b82f6',
    'Consumer': '#f59e0b',
    'Healthcare': '#10b981',
    'Energy': '#f97316',
    'Materials': '#a78bfa',
    'Industrials': '#ec4899',
    'Utilities': '#06b6d4',
    'Financials': '#84cc16'
  };

  function renderSectorDonut(stocks) {
    var visible = stocks.filter(function(s) {
      return !s.is_benchmark && selectedTickers.indexOf(s.ticker) !== -1 && s.sector;
    });

    var sectorCounts = {};
    visible.forEach(function(s) {
      sectorCounts[s.sector] = (sectorCounts[s.sector] || 0) + 1;
    });

    var labels = Object.keys(sectorCounts);
    var values = labels.map(function(l) { return sectorCounts[l]; });
    var colors = labels.map(function(l) { return SECTOR_COLORS[l] || '#64748b'; });

    if (labels.length === 0) {
      Plotly.purge($('sectorDonut'));
      return;
    }

    Plotly.newPlot($('sectorDonut'), [{
      labels: labels,
      values: values,
      type: 'pie',
      hole: 0.55,
      marker: { colors: colors, line: { color: '#141b2d', width: 2 } },
      textposition: 'none',
      hovertemplate: '<b>%{label}</b><br>%{value} stocks (%{percent})<extra></extra>',
      sort: false
    }], {
      paper_bgcolor: 'transparent',
      plot_bgcolor: 'transparent',
      font: { color: '#94a3b8', family: 'DM Sans, sans-serif' },
      margin: { t: 0, b: 0, l: 0, r: 0 },
      showlegend: false,
      hoverlabel: {
        bgcolor: '#1e293b', bordercolor: '#2a3650',
        font: { family: 'DM Sans, sans-serif', color: '#f1f5f9', size: 12 }
      }
    }, { responsive: true, displayModeBar: false });
  }

  /* ── Overlay Chart ── */
  function renderOverlayChart() {
    if (!pricesData || !pricesData.series) return;

    // Build a lookup for benchmark tickers
    var benchmarkSet = {};
    if (watchlistData && watchlistData.stocks) {
      watchlistData.stocks.forEach(function(s) {
        if (s.is_benchmark) benchmarkSet[s.ticker] = true;
      });
    }

    var BENCHMARK_STYLES = { 'SPY': { color: '#ffffff', label: 'S&P 500' }, 'QQQ': { color: '#a0aec0', label: 'Nasdaq 100' } };

    // Build SPY date->value map for relative mode
    var spySeries = pricesData.series['SPY'];
    var spyMap = {};
    if (spySeries) {
      for (var si = 0; si < spySeries.dates.length; si++) {
        spyMap[spySeries.dates[si]] = spySeries.values[si];
      }
    }
    var isRelative = chartMode === 'vs-spy' && spySeries;

    var traces = [];
    var stockSeries = [];
    var i = 0;

    // Stock traces first
    for (var ticker in pricesData.series) {
      if (!pricesData.series.hasOwnProperty(ticker)) continue;
      if (benchmarkSet[ticker]) continue;
      var s = pricesData.series[ticker];

      var yValues = s.values;
      if (isRelative) {
        // alpha = stock_normalized - spy_normalized + 100
        yValues = s.dates.map(function(d, idx) {
          var spyVal = spyMap[d];
          return spyVal != null ? Math.round((s.values[idx] - spyVal + 100) * 100) / 100 : s.values[idx];
        });
      }

      stockSeries.push({ dates: s.dates, values: yValues });
      traces.push({
        x: s.dates,
        y: yValues,
        type: 'scatter',
        mode: 'lines',
        name: ticker,
        line: { color: STOCK_COLORS[i % STOCK_COLORS.length], width: 2 },
        hoverlabel: { namelength: -1 },
        hovertemplate: '<b>' + ticker + '</b>: %{y:.2f}<extra></extra>'
      });
      i++;
    }

    // Benchmark traces — hide SPY in relative mode (it would be flat at 100)
    if (!isRelative) {
      for (var bTicker in pricesData.series) {
        if (!pricesData.series.hasOwnProperty(bTicker)) continue;
        if (!benchmarkSet[bTicker]) continue;
        var bs = pricesData.series[bTicker];
        var bStyle = BENCHMARK_STYLES[bTicker] || { color: '#94a3b8', label: bTicker };
        traces.push({
          x: bs.dates,
          y: bs.values,
          type: 'scatter',
          mode: 'lines',
          name: bStyle.label,
          line: { color: bStyle.color, width: 2.5, dash: 'dash' },
          opacity: 0.7,
          hoverlabel: { namelength: -1 },
          hovertemplate: '<b>' + bStyle.label + '</b>: %{y:.2f}<extra></extra>'
        });
      }
    }

    // Compute average return for the label above the chart (exclude benchmarks)
    var avgReturnPct = null;
    if (stockSeries.length > 1) {
      var lastValues = stockSeries.map(function(s) { return s.values[s.values.length - 1]; }).filter(Boolean);
      if (lastValues.length > 0) {
        var avg = lastValues.reduce(function(a, b) { return a + b; }, 0) / lastValues.length;
        avgReturnPct = avg - 100;
      }
    }

    var chartTitle = isRelative ? 'Performance vs S&P 500 (above 100 = outperforming)' : 'Normalized Return (rebased to 100)';

    var layout = baseLayout(chartTitle, {
      yaxis: {
        gridcolor: '#1e293b', linecolor: '#1e293b',
        tickfont: { color: '#94a3b8', family: 'Space Mono, monospace', size: 11 },
        zeroline: false
      },
      hovermode: 'closest',
      hoverdistance: 50,
      shapes: [{
        type: 'line',
        x0: 0, x1: 1, xref: 'paper',
        y0: 100, y1: 100,
        line: { color: '#475569', width: 1, dash: 'dot' }
      }]
    });

    var el = $('chartOverlay');
    Plotly.newPlot(el, traces, layout, { responsive: true, displayModeBar: false });

    // Highlight hovered trace, dim others
    el.on('plotly_hover', function(data) {
      var hoveredIdx = data.points[0].curveNumber;
      var update = { 'line.width': [], 'opacity': [] };
      for (var j = 0; j < traces.length; j++) {
        update['line.width'].push(j === hoveredIdx ? 3.5 : 1.5);
        update['opacity'].push(j === hoveredIdx ? 1 : 0.2);
      }
      Plotly.restyle(el, update);
    });

    el.on('plotly_unhover', function() {
      var update = { 'line.width': [], 'opacity': [] };
      for (var j = 0; j < traces.length; j++) {
        update['line.width'].push(2);
        update['opacity'].push(1);
      }
      Plotly.restyle(el, update);
    });

    // Update meta label above chart: avg + benchmark returns
    var metaEl = $('chartMeta');
    clearChildren(metaEl);

    function addMetaItem(text, color) {
      var sep = createEl('span', null, ' \u00b7 ');
      sep.style.color = 'var(--border-light)';
      if (metaEl.childNodes.length > 0) metaEl.appendChild(sep);
      var span = createEl('span', null, text);
      if (color) span.style.color = color;
      metaEl.appendChild(span);
    }

    if (stockSeries.length > 0) {
      addMetaItem(stockSeries.length + ' stocks', 'var(--text-muted)');
    }
    if (avgReturnPct !== null) {
      addMetaItem('avg ' + fmtPct(avgReturnPct), avgReturnPct >= 0 ? '#10b981' : '#ef4444');
    }

    // Add benchmark returns (skip in relative mode)
    if (!isRelative) {
      for (var bmTicker in pricesData.series) {
        if (!pricesData.series.hasOwnProperty(bmTicker)) continue;
        if (!benchmarkSet[bmTicker]) continue;
        var bmSeries = pricesData.series[bmTicker];
        if (bmSeries.values.length > 0) {
          var bmReturn = bmSeries.values[bmSeries.values.length - 1] - 100;
          var bmStyle = BENCHMARK_STYLES[bmTicker] || { color: '#94a3b8', label: bmTicker };
          addMetaItem(bmStyle.label + ' ' + fmtPct(bmReturn), bmStyle.color);
        }
      }
    } else {
      addMetaItem('vs S&P 500', '#ffffff');
    }
  }

  /* ── Table ── */
  function renderTable() {
    if (!watchlistData) return;

    // Recompute summary cards, sector donut, and selection count
    updateSummaryCards(watchlistData.stocks);
    renderSectorDonut(watchlistData.stocks);
    updateSelectionCount();

    var stocks = watchlistData.stocks.slice();

    stocks = stocks.filter(function(s) {
      return selectedTickers.indexOf(s.ticker) !== -1;
    });

    // Apply search filter
    var searchTerm = ($('tableSearch').value || '').toLowerCase().trim();
    if (searchTerm) {
      stocks = stocks.filter(function(s) {
        return s.ticker.toLowerCase().indexOf(searchTerm) !== -1 ||
               s.name.toLowerCase().indexOf(searchTerm) !== -1;
      });
    }

    stocks.sort(function(a, b) {
      var av = a[sortCol], bv = b[sortCol];
      if (av == null) av = -Infinity;
      if (bv == null) bv = -Infinity;
      if (typeof av === 'string') {
        return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      }
      return sortDir === 'asc' ? av - bv : bv - av;
    });

    // Update header sort indicators
    document.querySelectorAll('.data-table th[data-col]').forEach(function(th) {
      var col = th.getAttribute('data-col');
      th.classList.toggle('sorted', col === sortCol);
      var arrow = th.querySelector('.sort-arrow');
      if (arrow) arrow.remove();
      if (col === sortCol) {
        var span = createEl('span', 'sort-arrow', sortDir === 'asc' ? '\u25B2' : '\u25BC');
        th.appendChild(span);
      }
    });

    var tbody = $('stockTableBody');
    clearChildren(tbody);

    stocks.forEach(function(s) {
      var tr = document.createElement('tr');

      // Checkbox cell
      var tdCb = document.createElement('td');
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = selectedTickers.indexOf(s.ticker) !== -1;
      cb.style.accentColor = 'var(--accent)';
      cb.style.cursor = 'pointer';
      cb.addEventListener('change', function(e) {
        e.stopPropagation();
        if (cb.checked) {
          if (selectedTickers.indexOf(s.ticker) === -1) selectedTickers.push(s.ticker);
        } else {
          selectedTickers = selectedTickers.filter(function(t) { return t !== s.ticker; });
        }
        selectedGroup = '';
        groupSelect.value = '';
        updateCheckboxes();
        loadPricesAndRender();
      });
      tdCb.appendChild(cb);
      tr.appendChild(tdCb);

      // Ticker
      tr.appendChild(createEl('td', 'td-ticker', s.ticker));

      // Name
      tr.appendChild(createEl('td', null, s.name));

      // Price
      var tdPrice = createEl('td', 'td-money', fmtPrice(s.current_price));
      tdPrice.style.color = 'var(--accent)';
      tr.appendChild(tdPrice);

      // % Return
      var tdReturn = createEl('td', 'td-pct', fmtPct(s.period_return_pct));
      tdReturn.classList.add(s.period_return_pct >= 0 ? 'positive' : 'negative');
      tr.appendChild(tdReturn);

      // CAGR
      var tdCagr = createEl('td', 'td-pct', fmtPct(s.cagr_pct));
      tdCagr.classList.add(s.cagr_pct >= 0 ? 'positive' : 'negative');
      tr.appendChild(tdCagr);

      // 52W High
      tr.appendChild(createEl('td', 'td-money', s.high_52w ? fmtPrice(s.high_52w) : '--'));

      // 52W Low
      tr.appendChild(createEl('td', 'td-money', s.low_52w ? fmtPrice(s.low_52w) : '--'));

      // Row click for drilldown
      tr.addEventListener('click', function(e) {
        if (e.target.type === 'checkbox') return;
        showDrilldown(s.ticker);
      });

      tbody.appendChild(tr);
    });
  }

  /* ── Table sorting ── */
  document.querySelectorAll('.data-table th[data-col]').forEach(function(th) {
    th.addEventListener('click', function() {
      var col = th.getAttribute('data-col');
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = col === 'ticker' || col === 'name' ? 'asc' : 'desc';
      }
      renderTable();
    });
  });

  /* ── Table search ── */
  $('tableSearch').addEventListener('input', function() { renderTable(); });

  /* ── Heatmap rendering ── */
  function renderHeatmap() {
    if (!watchlistData) return;
    var grid = $('heatmapGrid');
    clearChildren(grid);

    var stocks = watchlistData.stocks.filter(function(s) { return !s.is_benchmark; });
    stocks.sort(function(a, b) { return b.period_return_pct - a.period_return_pct; });

    // Determine color scale range
    var returns = stocks.map(function(s) { return s.period_return_pct; });
    var maxAbs = Math.max(Math.abs(Math.min.apply(null, returns)), Math.abs(Math.max.apply(null, returns)), 1);

    stocks.forEach(function(s) {
      var tile = createEl('div', 'heatmap-tile');
      var ratio = Math.min(Math.abs(s.period_return_pct) / maxAbs, 1);
      var intensity = 0.15 + ratio * 0.65; // 0.15 to 0.8 opacity range

      if (s.period_return_pct >= 0) {
        tile.style.background = 'rgba(16, 185, 129, ' + intensity + ')';
      } else {
        tile.style.background = 'rgba(239, 68, 68, ' + intensity + ')';
      }

      tile.appendChild(createEl('div', 'heatmap-ticker', s.ticker));
      tile.appendChild(createEl('div', 'heatmap-return', fmtPct(s.period_return_pct)));
      tile.appendChild(createEl('div', 'heatmap-name', s.name));

      tile.addEventListener('click', function() {
        // Switch to stocks view and show drilldown
        document.querySelector('.view-tab[data-view="stocks"]').click();
        showDrilldown(s.ticker);
      });

      grid.appendChild(tile);
    });
  }

  /* ── Chart mode toggle ── */
  document.querySelectorAll('.chart-mode-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var mode = btn.getAttribute('data-mode');
      if (mode === chartMode) return;
      chartMode = mode;
      document.querySelectorAll('.chart-mode-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderOverlayChart();
    });
  });

  /* ── Select / Unselect All ── */
  $('selectAllBtn').addEventListener('click', function() {
    selectedTickers = allTickers.slice();
    selectedGroup = '';
    groupSelect.value = '';
    updateCheckboxes();
    renderTable();
    loadPricesAndRender();
  });

  $('unselectAllBtn').addEventListener('click', function() {
    selectedTickers = [];
    selectedGroup = '';
    groupSelect.value = '';
    updateCheckboxes();
    renderTable();
    loadPricesAndRender();
  });

  function updateSelectionCount() {
    var total = allTickers.length;
    var selected = selectedTickers.length;
    $('selectionCount').textContent = selected + ' / ' + total + ' selected';
  }

  /* ── View Switching ── */
  document.querySelectorAll('.view-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      var view = tab.getAttribute('data-view');
      if (view === activeView) return;
      activeView = view;
      document.querySelectorAll('.view-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');

      var stocksView = $('stocksView');
      var comparePanel = $('comparePanel');
      var controlsRow = document.querySelector('.controls-row');

      var heatmapPanel = $('heatmapPanel');

      // Hide all views
      stocksView.classList.add('hidden');
      comparePanel.classList.remove('active');
      heatmapPanel.classList.remove('active');
      document.querySelector('.controls-left').style.display = '';

      if (view === 'stocks') {
        stocksView.classList.remove('hidden');
      } else if (view === 'compare') {
        comparePanel.classList.add('active');
        document.querySelector('.controls-left').style.display = 'none';
        renderGroupComparison();
      } else if (view === 'heatmap') {
        heatmapPanel.classList.add('active');
        document.querySelector('.controls-left').style.display = 'none';
        renderHeatmap();
      }
    });
  });

  /* ── Group Comparison ── */
  function renderGroupComparison() {
    if (!watchlistData || !watchlistData.groups || watchlistData.groups.length === 0) {
      $('compareGrid').textContent = 'No groups configured.';
      return;
    }

    var groups = watchlistData.groups;
    var stockMap = {};
    watchlistData.stocks.forEach(function(s) { stockMap[s.ticker] = s; });

    // Build summary cards
    var summaryRow = $('compareSummaryRow');
    clearChildren(summaryRow);

    groups.forEach(function(g, gi) {
      var color = GROUP_COLORS[g.name] || GROUP_COLOR_LIST[gi % GROUP_COLOR_LIST.length];
      var members = g.tickers.map(function(t) { return stockMap[t]; }).filter(Boolean);
      if (members.length === 0) return;

      var returns = members.map(function(s) { return s.period_return_pct; });
      var avgReturn = returns.reduce(function(a, b) { return a + b; }, 0) / returns.length;
      var best = members.reduce(function(a, b) { return a.period_return_pct > b.period_return_pct ? a : b; });

      var card = createEl('div', 'compare-summary-card');
      card.style.borderTop = '3px solid ' + color;

      var label = createEl('div', 'compare-summary-label', g.name);
      label.style.color = color;
      card.appendChild(label);

      var val = createEl('div', 'compare-summary-value', fmtPct(avgReturn));
      val.style.color = avgReturn >= 0 ? '#10b981' : '#ef4444';
      card.appendChild(val);

      var detail = createEl('div', 'compare-summary-detail');
      detail.textContent = members.length + ' stocks \u00b7 best: ' + best.ticker + ' ' + fmtPct(best.period_return_pct);
      card.appendChild(detail);

      summaryRow.appendChild(card);
    });

    // Build side-by-side line charts — one per group
    var grid = $('compareGrid');
    clearChildren(grid);

    var params = getDateParams();
    var fetchPromises = [];

    groups.forEach(function(g, gi) {
      var members = g.tickers.filter(function(t) { return stockMap[t]; });
      if (members.length === 0) return;

      var color = GROUP_COLORS[g.name] || GROUP_COLOR_LIST[gi % GROUP_COLOR_LIST.length];

      // Create the card and chart div now, fetch data async
      var card = createEl('div', 'compare-card');

      var title = createEl('div', 'compare-card-title', g.name);
      card.appendChild(title);

      var meta = createEl('div', 'compare-card-meta');
      var avgRet = members.reduce(function(a, t) { return a + stockMap[t].period_return_pct; }, 0) / members.length;
      meta.textContent = members.length + ' stocks \u00b7 avg ' + fmtPct(avgRet);
      card.appendChild(meta);

      var chartDiv = document.createElement('div');
      chartDiv.style.width = '100%';
      chartDiv.style.minHeight = '340px';
      card.appendChild(chartDiv);
      grid.appendChild(card);

      // Fetch normalized prices for this group's tickers
      var url = '/api/investments/prices' + params;
      url += (params ? '&' : '?') + 'tickers=' + members.join(',') + '&normalize=true';

      fetchPromises.push(
        fetch(url)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var traces = [];
            var ti = 0;
            for (var ticker in data.series) {
              if (!data.series.hasOwnProperty(ticker)) continue;
              var s = data.series[ticker];
              traces.push({
                x: s.dates,
                y: s.values,
                type: 'scatter',
                mode: 'lines',
                name: ticker,
                line: { color: STOCK_COLORS[ti % STOCK_COLORS.length], width: 2 },
                hoverlabel: { namelength: -1 },
                hovertemplate: '<b>' + ticker + '</b>: %{y:.2f}<extra></extra>'
              });
              ti++;
            }

            Plotly.newPlot(chartDiv, traces, {
              paper_bgcolor: '#141b2d',
              plot_bgcolor: '#141b2d',
              font: { color: '#94a3b8', family: 'DM Sans, sans-serif' },
              xaxis: {
                gridcolor: '#1e293b', linecolor: '#1e293b',
                tickfont: { color: '#94a3b8', family: 'DM Sans, sans-serif', size: 10 },
                zeroline: false
              },
              yaxis: {
                gridcolor: '#1e293b', linecolor: '#1e293b',
                tickfont: { color: '#94a3b8', family: 'Space Mono, monospace', size: 10 },
                zeroline: false
              },
              margin: { t: 8, b: 36, l: 50, r: 12 },
              hovermode: 'closest',
              hoverdistance: 50,
              hoverlabel: {
                bgcolor: '#1e293b', bordercolor: '#2a3650',
                font: { family: 'DM Sans, sans-serif', color: '#f1f5f9', size: 13 }
              },
              legend: {
                orientation: 'h', y: -0.2, x: 0.5, xanchor: 'center',
                font: { color: '#94a3b8', size: 10, family: 'DM Sans, sans-serif' }
              },
              shapes: [{
                type: 'line', x0: 0, x1: 1, xref: 'paper',
                y0: 100, y1: 100,
                line: { color: '#475569', width: 1, dash: 'dot' }
              }]
            }, { responsive: true, displayModeBar: false });

            // Highlight on hover, dim others
            chartDiv.on('plotly_hover', function(ev) {
              var idx = ev.points[0].curveNumber;
              var upd = { 'line.width': [], 'opacity': [] };
              for (var j = 0; j < traces.length; j++) {
                upd['line.width'].push(j === idx ? 3.5 : 1.5);
                upd['opacity'].push(j === idx ? 1 : 0.2);
              }
              Plotly.restyle(chartDiv, upd);
            });
            chartDiv.on('plotly_unhover', function() {
              var upd = { 'line.width': [], 'opacity': [] };
              for (var j = 0; j < traces.length; j++) {
                upd['line.width'].push(2);
                upd['opacity'].push(1);
              }
              Plotly.restyle(chartDiv, upd);
            });
          })
      );
    });
  }

  /* ── Init ── */
  setPreset('1Y');
})();
</script>
</body>
</html>
