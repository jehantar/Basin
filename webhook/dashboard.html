<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basin — Fitness</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px;
  }
  a { color: #3b82f6; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #f1f5f9;
  }
  .header .sync-info {
    font-size: 0.85rem;
    color: #64748b;
  }

  /* Cards grid */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .card:hover { border-color: #334155; }
  .card:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
  .card.active-running { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.15); }
  .card.active-vo2max  { border-color: #a78bfa; box-shadow: 0 0 20px rgba(167,139,250,0.15); }
  .card.active-strength { border-color: #22c55e; box-shadow: 0 0 20px rgba(34,197,94,0.15); }

  .card-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .card-label.running  { color: #3b82f6; }
  .card-label.vo2max   { color: #a78bfa; }
  .card-label.strength { color: #22c55e; }

  .card-value {
    font-size: 2rem;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1.1;
  }
  .card-sub {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-top: 4px;
    margin-bottom: 12px;
  }
  .card-trend {
    font-size: 0.8rem;
    color: #64748b;
    margin-bottom: 8px;
  }
  .sparkline { height: 40px; }

  /* Detail panel */
  .detail-panel {
    background: #1e293b;
    border-radius: 12px;
    padding: 24px;
    min-height: 400px;
  }

  /* Filters */
  .filters {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .preset-btn {
    background: #334155;
    color: #94a3b8;
    border: 1px solid #475569;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    outline: none;
  }
  .preset-btn:hover { background: #475569; color: #e2e8f0; }
  .preset-btn:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
  .preset-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

  .date-input {
    background: #0f172a;
    color: #e2e8f0;
    border: 1px solid #475569;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.85rem;
    outline: none;
  }
  .date-input:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
  .filters-sep { color: #475569; margin: 0 4px; }

  /* Chart area */
  .chart-area { width: 100%; min-height: 320px; }

  /* Runs table */
  .runs-table-wrapper {
    margin-top: 20px;
    max-height: 320px;
    overflow-y: auto;
    border-radius: 8px;
    border: 1px solid #334155;
  }
  .runs-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .runs-table thead { position: sticky; top: 0; z-index: 1; }
  .runs-table th {
    text-align: left;
    color: #64748b;
    font-weight: 600;
    padding: 8px 12px;
    border-bottom: 1px solid #334155;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    background: #1e293b;
  }
  .runs-table td {
    padding: 8px 12px;
    color: #cbd5e1;
    border-bottom: 1px solid #0f172a;
  }
  .runs-table tr:hover td { background: #0f172a; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: #64748b;
    text-align: center;
  }
  .empty-state p { margin-bottom: 16px; font-size: 1rem; }
  .empty-state button {
    background: #334155;
    color: #e2e8f0;
    border: 1px solid #475569;
    border-radius: 6px;
    padding: 8px 20px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .empty-state button:hover { background: #475569; }

  /* Error banner */
  .error-banner {
    background: #451a2a;
    border: 1px solid #991b1b;
    border-radius: 8px;
    padding: 12px 20px;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 12px;
  }
  .error-banner.visible { display: flex; }
  .error-banner .error-msg { flex: 1; color: #fca5a5; font-size: 0.9rem; }
  .error-banner button {
    background: #991b1b;
    color: #fca5a5;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .error-banner button:hover { background: #b91c1c; }

  /* Calendar heatmap */
  .calendar-strip {
    background: #1e293b; border-radius: 12px; padding: 14px 18px;
    margin-bottom: 16px; border: 1px solid #334155;
  }
  .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .calendar-title { font-size: 0.8rem; color: #94a3b8; font-weight: 600; }
  .calendar-stat { font-size: 0.75rem; color: #64748b; }
  .calendar-body { display: flex; gap: 0; }
  .calendar-day-labels {
    display: flex; flex-direction: column; gap: 3px; padding-right: 6px;
    font-size: 0.6rem; color: #475569;
  }
  .calendar-day-labels span { height: 14px; line-height: 14px; }
  .calendar-months { display: flex; font-size: 0.6rem; color: #475569; margin-bottom: 4px; padding-left: 28px; }
  .calendar-months span { text-align: left; }
  .calendar-grid { display: flex; gap: 3px; overflow-x: auto; }
  .cal-week { display: flex; flex-direction: column; gap: 3px; }
  .cal-day {
    width: 14px; height: 14px; border-radius: 3px; background: #0f172a; border: 1px solid #1e293b;
  }
  .cal-day.active { background: #22c55e; border-color: #22c55e; }
  .calendar-legend { display: flex; gap: 16px; margin-top: 8px; font-size: 0.65rem; color: #475569; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-box { width: 10px; height: 10px; border-radius: 2px; }

  /* Strength tabs */
  .workout-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .workout-tab {
    padding: 6px 14px; border-radius: 8px; cursor: pointer;
    font-size: 0.8rem; font-weight: 600; border: 2px solid #334155;
    background: #1e293b; color: #94a3b8; transition: all 0.15s;
  }
  .workout-tab:hover { border-color: #475569; }
  .workout-tab.active { border-color: #22c55e; color: #22c55e; background: #0f2a1a; }
  .workout-tab:focus-visible { outline: 2px solid #22c55e; outline-offset: 2px; }
  .workout-tab .tab-count { font-weight: 400; color: #475569; font-size: 0.7rem; }

  /* Trend summary */
  .trend-cards { display: flex; gap: 12px; margin-bottom: 16px; }
  .trend-card { background: #0f172a; border-radius: 8px; padding: 10px 14px; flex: 1; border: 1px solid #334155; }
  .trend-card-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .trend-card-value { font-size: 1.2rem; font-weight: 700; }
  .trend-card-sub { font-size: 0.7rem; color: #64748b; margin-top: 2px; }

  /* Workout log */
  .workout-log { max-height: 400px; overflow-y: auto; border-radius: 8px; border: 1px solid #334155; margin-top: 16px; }
  .wk-row { background: #1e293b; border-bottom: 1px solid #0f172a; }
  .wk-header {
    display: grid; grid-template-columns: 80px 1fr 60px 55px 90px;
    padding: 10px 14px; align-items: center; font-size: 0.8rem;
    cursor: pointer; transition: background 0.15s; outline: none;
  }
  .wk-header:hover, .wk-header:focus-visible { background: #253347; }
  .wk-date { color: #94a3b8; }
  .wk-title { color: #f1f5f9; font-weight: 600; }
  .wk-stat { color: #64748b; text-align: center; }
  .wk-volume { color: #22c55e; font-weight: 600; text-align: right; }
  .wk-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s; background: #0f172a; }
  .wk-detail.open { max-height: 800px; }
  .wk-detail-inner { padding: 10px 14px; }
  .wk-exercise { margin-bottom: 8px; }
  .wk-exercise-name { color: #94a3b8; font-size: 0.8rem; font-weight: 600; display: flex; justify-content: space-between; margin-bottom: 3px; }
  .wk-exercise-vol { color: #475569; font-weight: 400; }
  .wk-set { display: flex; gap: 10px; font-size: 0.78rem; padding: 1px 0; }
  .wk-set-label { color: #475569; width: 45px; }
  .wk-set-weight { color: #22c55e; width: 65px; }
  .wk-set-reps { color: #94a3b8; }

  /* Hide panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Responsive */
  @media (max-width: 768px) {
    .cards { grid-template-columns: 1fr; }
    .filters { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Basin &mdash; Fitness</h1>
  <span class="sync-info" id="syncInfo">Last sync: &mdash;</span>
</div>

<div class="error-banner" id="errorBanner">
  <span class="error-msg" id="errorMsg"></span>
  <button id="retryBtn" tabindex="0">Retry</button>
</div>

<div class="cards">
  <div class="card" id="cardRunning" tabindex="0" role="button" aria-label="Weekly Mileage">
    <div class="card-label running">Weekly Mileage</div>
    <div class="card-value" id="runningValue">Loading...</div>
    <div class="card-sub" id="runningSub">&nbsp;</div>
    <div class="card-trend" id="runningTrend">&nbsp;</div>
    <div class="sparkline" id="sparkRunning"></div>
  </div>
  <div class="card" id="cardVo2max" tabindex="0" role="button" aria-label="VO2 Max">
    <div class="card-label vo2max">VO2 Max</div>
    <div class="card-value" id="vo2maxValue">Loading...</div>
    <div class="card-sub" id="vo2maxSub">&nbsp;</div>
    <div class="card-trend" id="vo2maxTrend">&nbsp;</div>
    <div class="sparkline" id="sparkVo2max"></div>
  </div>
  <div class="card" id="cardStrength" tabindex="0" role="button" aria-label="Strength">
    <div class="card-label strength">Strength</div>
    <div class="card-value" id="strengthValue">Loading...</div>
    <div class="card-sub" id="strengthSub">&nbsp;</div>
    <div class="card-trend" id="strengthTrend">&nbsp;</div>
    <div class="sparkline" id="sparkStrength"></div>
  </div>
</div>

<div class="calendar-strip" id="calendarStrip">
  <div class="calendar-header">
    <span class="calendar-title">Training Activity</span>
    <span class="calendar-stat" id="calendarStat"></span>
  </div>
  <div class="calendar-months" id="calendarMonths"></div>
  <div class="calendar-body">
    <div class="calendar-day-labels">
      <span></span>
      <span>Mon</span>
      <span></span>
      <span>Wed</span>
      <span></span>
      <span>Fri</span>
      <span></span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
  <div class="calendar-legend">
    <div class="legend-item"><div class="legend-box" style="background:#0f172a;border:1px solid #334155;"></div> Rest</div>
    <div class="legend-item"><div class="legend-box" style="background:#22c55e;"></div> Trained</div>
  </div>
</div>

<div class="detail-panel">
  <div class="filters">
    <button class="preset-btn" data-months="3" tabindex="0">3M</button>
    <button class="preset-btn" data-months="6" tabindex="0">6M</button>
    <button class="preset-btn" data-months="12" tabindex="0">1Y</button>
    <button class="preset-btn" data-months="0" tabindex="0">All</button>
    <span class="filters-sep">|</span>
    <input type="date" class="date-input" id="startDate" tabindex="0" aria-label="Start date">
    <span class="filters-sep">&ndash;</span>
    <input type="date" class="date-input" id="endDate" tabindex="0" aria-label="End date">
  </div>

  <div class="panel" id="panelRunning">
    <div class="chart-area" id="chartRunning"></div>
    <div class="runs-table-wrapper">
      <table class="runs-table" id="runsTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Distance</th>
            <th>Pace</th>
            <th>Speed</th>
            <th>Duration</th>
            <th>Cadence</th>
            <th>Avg Power</th>
          </tr>
        </thead>
        <tbody id="runsBody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel" id="panelVo2max">
    <div class="chart-area" id="chartVo2max"></div>
  </div>

  <div class="panel" id="panelStrength">
    <div class="workout-tabs" id="workoutTabs" role="tablist"></div>
    <div class="trend-cards">
      <div class="trend-card">
        <div class="trend-card-label">Volume Trend</div>
        <div class="trend-card-value" id="trendVolume">---</div>
        <div class="trend-card-sub" id="trendVolumeSub"></div>
      </div>
      <div class="trend-card">
        <div class="trend-card-label">Peak Session</div>
        <div class="trend-card-value" id="trendPeak">---</div>
        <div class="trend-card-sub" id="trendPeakSub"></div>
      </div>
      <div class="trend-card">
        <div class="trend-card-label">Sessions</div>
        <div class="trend-card-value" id="trendSessions">---</div>
        <div class="trend-card-sub" id="trendSessionsSub"></div>
      </div>
    </div>
    <div class="chart-area" id="chartStrength"></div>
    <div class="workout-log" id="workoutLog"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // -- State --
  var activePanel = 'running';
  var runData = null;
  var vo2Data = null;
  var strData = null;
  var activePreset = null;

  // -- DOM refs --
  function $(id) { return document.getElementById(id); }
  var cardRunning  = $('cardRunning');
  var cardVo2max   = $('cardVo2max');
  var cardStrength = $('cardStrength');
  var startInput   = $('startDate');
  var endInput     = $('endDate');
  var errorBanner  = $('errorBanner');
  var errorMsg     = $('errorMsg');
  var retryBtn     = $('retryBtn');
  var syncInfo     = $('syncInfo');

  // -- Helpers --
  function clearChildren(el) {
    while (el.firstChild) { el.removeChild(el.firstChild); }
  }

  function fmtDate(iso) {
    var d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function speedToPace(mph) {
    if (!mph || mph <= 0) return '---';
    var minPerMi = 60 / mph;
    var mins = Math.floor(minPerMi);
    var secs = Math.round((minPerMi - mins) * 60);
    if (secs === 60) return (mins + 1) + ':00';
    return mins + ':' + String(secs).padStart(2, '0');
  }

  function isoToday() {
    return new Date().toISOString().slice(0, 10);
  }

  function isoMonthsAgo(m) {
    var d = new Date();
    d.setMonth(d.getMonth() - m);
    return d.toISOString().slice(0, 10);
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorBanner.classList.add('visible');
  }

  function hideError() {
    errorBanner.classList.remove('visible');
  }

  function showEmpty(containerId) {
    var el = $(containerId);
    clearChildren(el);
    var wrap = document.createElement('div');
    wrap.className = 'empty-state';
    var p = document.createElement('p');
    p.textContent = 'No data in selected range';
    var btn = document.createElement('button');
    btn.textContent = 'Show all time';
    btn.tabIndex = 0;
    btn.addEventListener('click', function() { setPreset(0); });
    wrap.appendChild(p);
    wrap.appendChild(btn);
    el.appendChild(wrap);
  }

  // -- Sparkline renderer --
  function renderSparkline(elId, values, color) {
    var el = $(elId);
    if (!values || values.length === 0) {
      clearChildren(el);
      return;
    }
    Plotly.newPlot(el, [{
      y: values,
      type: 'bar',
      marker: { color: color, opacity: 0.7 },
      hoverinfo: 'none'
    }], {
      margin: { t: 0, b: 0, l: 0, r: 0 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      xaxis: { visible: false },
      yaxis: { visible: false },
      height: 40,
      width: el.offsetWidth || 200
    }, { staticPlot: true, responsive: true, displayModeBar: false });
  }

  // -- Plotly layout base --
  function baseLayout(title, xTitle, yTitle, extra) {
    var layout = {
      paper_bgcolor: '#1e293b',
      plot_bgcolor: '#1e293b',
      font: { color: '#94a3b8', family: 'system-ui, -apple-system, sans-serif' },
      title: { text: title, font: { size: 16, color: '#e2e8f0' } },
      xaxis: {
        title: xTitle,
        gridcolor: '#334155',
        linecolor: '#334155',
        tickfont: { color: '#94a3b8' }
      },
      yaxis: {
        title: yTitle,
        gridcolor: '#334155',
        linecolor: '#334155',
        tickfont: { color: '#94a3b8' }
      },
      margin: { t: 50, b: 50, l: 60, r: 20 },
      hovermode: 'x unified'
    };
    if (extra) { Object.keys(extra).forEach(function(k) { layout[k] = extra[k]; }); }
    return layout;
  }

  var plotConfig = { responsive: true, displayModeBar: false };

  // -- Card updates --
  function updateRunningCard() {
    if (!runData) return;
    var s = runData.summary;
    if (s.total_runs > 0 && s.total_distance_mi != null) {
      $('runningValue').textContent = s.total_distance_mi.toFixed(1) + ' mi';
      $('runningSub').textContent = s.total_runs + ' runs \u00b7 avg ' + (s.latest_pace_min_per_mile || '---') + ' /mi';
    } else {
      $('runningValue').textContent = '---';
      $('runningSub').textContent = 'No runs in range';
    }
    // Sparkline: weekly mileage bars
    var weeklyMiles = {};
    runData.runs.forEach(function(r) {
      if (r.distance_mi == null) return;
      var d = new Date(r.date + 'T00:00:00');
      var day = d.getDay();
      var diff = d.getDate() - day + (day === 0 ? -6 : 1);
      var monday = new Date(d.setDate(diff));
      var weekKey = monday.toISOString().split('T')[0];
      weeklyMiles[weekKey] = (weeklyMiles[weekKey] || 0) + r.distance_mi;
    });
    var weekVals = Object.keys(weeklyMiles).sort().map(function(w) { return weeklyMiles[w]; });
    if (weekVals.length > 0) {
      $('runningTrend').textContent = s.total_runs + ' runs in range';
      renderSparkline('sparkRunning', weekVals.slice(-12), '#3b82f6');
    } else {
      $('runningTrend').textContent = '';
    }
  }

  function updateVo2maxCard() {
    if (!vo2Data) return;
    var s = vo2Data.summary;
    if (s.latest != null) {
      $('vo2maxValue').textContent = s.latest.toFixed(1);
      $('vo2maxSub').textContent = 'Peak: ' + (s.peak != null ? s.peak.toFixed(1) : '---') + ' mL/kg/min';
    } else {
      $('vo2maxValue').textContent = '---';
      $('vo2maxSub').textContent = 'No readings in range';
    }
    var vals = vo2Data.readings.map(function(r) { return r.vo2max; });
    if (vals.length >= 2) {
      var diff = (vals[vals.length - 1] - vals[0]).toFixed(1);
      $('vo2maxTrend').textContent = (diff >= 0 ? '+' : '') + diff + ' over range';
    } else {
      $('vo2maxTrend').textContent = '';
    }
    renderSparkline('sparkVo2max', vals.slice(-20), '#a78bfa');
  }

  function updateStrengthCard() {
    if (!strData) return;
    var workouts = strData.workouts || [];
    if (workouts.length > 0) {
      var latest = workouts[workouts.length - 1];
      $('strengthValue').textContent = latest.volume_lbs.toLocaleString() + ' lbs';
      $('strengthSub').textContent = latest.title;
    } else {
      $('strengthValue').textContent = '---';
      $('strengthSub').textContent = 'No workouts in range';
    }
    // Sparkline: volume per workout across all types
    var vols = workouts.map(function(w) { return w.volume_lbs; });
    if (vols.length > 0) {
      $('strengthTrend').textContent = workouts.length + ' sessions in range';
      renderSparkline('sparkStrength', vols.slice(-20), '#22c55e');
    } else {
      $('strengthTrend').textContent = '';
    }
  }

  // -- Panel rendering --
  function renderRunningPanel() {
    var container = $('chartRunning');
    var tbody = $('runsBody');
    if (!runData || runData.runs.length === 0) {
      showEmpty('chartRunning');
      clearChildren(tbody);
      return;
    }
    var runs = runData.runs;

    // Aggregate into weekly mileage (ISO week)
    var weeklyMiles = {};
    runs.forEach(function(r) {
      if (r.distance_mi == null) return;
      var d = new Date(r.date + 'T00:00:00');
      // Get Monday of this week
      var day = d.getDay();
      var diff = d.getDate() - day + (day === 0 ? -6 : 1);
      var monday = new Date(d.setDate(diff));
      var weekKey = monday.toISOString().split('T')[0];
      weeklyMiles[weekKey] = (weeklyMiles[weekKey] || 0) + r.distance_mi;
    });
    var weekDates = Object.keys(weeklyMiles).sort();
    var weekValues = weekDates.map(function(w) { return Math.round(weeklyMiles[w] * 100) / 100; });

    // Weekly run counts for hover
    var weekRunCounts = {};
    runs.forEach(function(r) {
      var d = new Date(r.date + 'T00:00:00');
      var day = d.getDay();
      var diff = d.getDate() - day + (day === 0 ? -6 : 1);
      var monday = new Date(d.setDate(diff));
      var weekKey = monday.toISOString().split('T')[0];
      weekRunCounts[weekKey] = (weekRunCounts[weekKey] || 0) + 1;
    });
    var hoverText = weekDates.map(function(w) {
      return weekRunCounts[w] + ' run' + (weekRunCounts[w] > 1 ? 's' : '');
    });

    Plotly.newPlot(container, [{
      x: weekDates,
      y: weekValues,
      type: 'bar',
      marker: { color: '#3b82f6', opacity: 0.8 },
      text: hoverText,
      hovertemplate: 'Week of %{x}<br>%{y:.1f} mi<br>%{text}<extra></extra>'
    }], baseLayout('Weekly Mileage', 'Week', 'Miles'), plotConfig);

    // Recent runs table
    clearChildren(tbody);
    var recent = runs.slice().reverse();
    recent.forEach(function(r) {
      var tr = document.createElement('tr');

      var tdDate = document.createElement('td');
      tdDate.textContent = fmtDate(r.date);
      tr.appendChild(tdDate);

      var tdDist = document.createElement('td');
      tdDist.textContent = r.distance_mi != null ? r.distance_mi.toFixed(2) + ' mi' : '---';
      tr.appendChild(tdDist);

      var tdPace = document.createElement('td');
      tdPace.textContent = r.avg_speed_mph != null ? speedToPace(r.avg_speed_mph) + ' /mi' : '---';
      tr.appendChild(tdPace);

      var tdSpeed = document.createElement('td');
      tdSpeed.textContent = r.avg_speed_mph != null ? r.avg_speed_mph.toFixed(2) + ' mi/hr' : '---';
      tr.appendChild(tdSpeed);

      var tdDur = document.createElement('td');
      tdDur.textContent = r.duration_min != null ? r.duration_min.toFixed(1) + ' min' : '---';
      tr.appendChild(tdDur);

      var tdCadence = document.createElement('td');
      tdCadence.textContent = r.cadence_spm != null ? r.cadence_spm + ' spm' : '---';
      tr.appendChild(tdCadence);

      var tdPower = document.createElement('td');
      tdPower.textContent = r.avg_power != null ? r.avg_power + ' W' : '---';
      tr.appendChild(tdPower);

      tbody.appendChild(tr);
    });
  }

  function renderVo2maxPanel() {
    var container = $('chartVo2max');
    if (!vo2Data || vo2Data.readings.length === 0) {
      showEmpty('chartVo2max');
      return;
    }
    var readings = vo2Data.readings;
    var dates = readings.map(function(r) { return r.date; });
    var vals  = readings.map(function(r) { return r.vo2max; });
    var peak  = vo2Data.summary.peak;

    var traces = [{
      x: dates,
      y: vals,
      type: 'scatter',
      mode: 'lines+markers',
      line: { color: '#a78bfa', width: 2 },
      marker: { color: '#a78bfa', size: 6 },
      hovertemplate: '%{x}<br>VO2 Max: %{y:.1f} mL/kg/min<extra></extra>'
    }];

    var shapes = [];
    var annotations = [];
    if (peak != null) {
      shapes.push({
        type: 'line',
        xref: 'paper',
        x0: 0, x1: 1,
        y0: peak, y1: peak,
        line: { color: '#a78bfa', width: 1, dash: 'dash' }
      });
      annotations.push({
        xref: 'paper', x: 1,
        y: peak,
        text: 'Peak: ' + peak.toFixed(1),
        showarrow: false,
        font: { color: '#a78bfa', size: 11 },
        xanchor: 'right',
        yanchor: 'bottom'
      });
    }

    Plotly.newPlot(container, traces,
      baseLayout('VO2 Max Trend', 'Date', 'mL/kg/min', { shapes: shapes, annotations: annotations }),
      plotConfig
    );
  }

  var activeWorkoutTitle = '__all__';
  var TITLE_COLORS = ['#22c55e', '#3b82f6', '#f59e0b', '#a78bfa', '#ef4444', '#06b6d4'];

  function getTitleColor(title) {
    var titles = (strData && strData.workout_titles) || [];
    var idx = titles.indexOf(title);
    return TITLE_COLORS[idx >= 0 ? idx % TITLE_COLORS.length : 0];
  }

  function renderStrengthPanel() {
    if (!strData || !strData.workouts || strData.workouts.length === 0) {
      showEmpty('chartStrength');
      return;
    }

    var titles = strData.workout_titles || [];
    if (titles.length === 0) return;

    // Default to All
    if (activeWorkoutTitle !== '__all__' && titles.indexOf(activeWorkoutTitle) === -1) {
      activeWorkoutTitle = '__all__';
    }

    // Count workouts per title
    var titleCounts = {};
    strData.workouts.forEach(function(w) {
      titleCounts[w.title] = (titleCounts[w.title] || 0) + 1;
    });

    // Build tabs: "All" first, then per-type
    var tabContainer = $('workoutTabs');
    clearChildren(tabContainer);

    var allTabs = ['__all__'].concat(titles);
    allTabs.forEach(function(title) {
      var tab = document.createElement('button');
      var isActive = title === activeWorkoutTitle;
      tab.className = 'workout-tab' + (isActive ? ' active' : '');
      tab.setAttribute('role', 'tab');
      tab.setAttribute('tabindex', '0');
      tab.setAttribute('aria-selected', isActive ? 'true' : 'false');

      var nameSpan = document.createElement('span');
      if (title === '__all__') {
        nameSpan.textContent = 'All ';
      } else {
        nameSpan.textContent = title + ' ';
      }
      tab.appendChild(nameSpan);

      var countSpan = document.createElement('span');
      countSpan.className = 'tab-count';
      var count = title === '__all__' ? strData.workouts.length : (titleCounts[title] || 0);
      countSpan.textContent = '(' + count + ')';
      tab.appendChild(countSpan);

      function selectTab() {
        activeWorkoutTitle = title;
        renderStrengthPanel();
      }
      tab.addEventListener('click', selectTab);
      tab.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectTab();
        }
      });

      tabContainer.appendChild(tab);
    });

    // Filter workouts by active title
    var filtered;
    if (activeWorkoutTitle === '__all__') {
      filtered = strData.workouts;
    } else {
      filtered = strData.workouts.filter(function(w) {
        return w.title === activeWorkoutTitle;
      });
    }

    renderStrengthContent(filtered);
  }

  function renderStrengthContent(filtered) {
    // Update trend cards
    var trendVolEl = $('trendVolume');
    var trendVolSub = $('trendVolumeSub');
    var trendPeakEl = $('trendPeak');
    var trendPeakSub = $('trendPeakSub');
    var trendSessEl = $('trendSessions');
    var trendSessSub = $('trendSessionsSub');

    if (filtered.length < 2) {
      trendVolEl.textContent = '---';
      trendVolSub.textContent = filtered.length < 2 ? 'Need 2+ sessions' : '';
    } else {
      var first = filtered[0];
      var last = filtered[filtered.length - 1];
      if (first.volume_lbs <= 0) {
        trendVolEl.textContent = '---';
        trendVolSub.textContent = '';
      } else {
        var pctChange = ((last.volume_lbs - first.volume_lbs) / first.volume_lbs * 100);
        trendVolEl.textContent = (pctChange >= 0 ? '+' : '') + pctChange.toFixed(1) + '%';
        trendVolSub.textContent = first.volume_lbs.toLocaleString() + ' \u2192 ' + last.volume_lbs.toLocaleString() + ' lbs';
      }
    }

    // Peak session
    if (filtered.length === 0) {
      trendPeakEl.textContent = '---';
      trendPeakSub.textContent = '';
    } else {
      var peak = filtered[0];
      for (var i = 1; i < filtered.length; i++) {
        if (filtered[i].volume_lbs > peak.volume_lbs) peak = filtered[i];
      }
      trendPeakEl.textContent = peak.volume_lbs.toLocaleString() + ' lbs';
      trendPeakSub.textContent = fmtDate(peak.date);
    }

    // Sessions count
    trendSessEl.textContent = filtered.length;
    var sessLabel = filtered.length === 1 ? 'session' : 'sessions';
    if (activeWorkoutTitle === '__all__') {
      var typeCount = (strData.workout_titles || []).length;
      sessLabel += ' \u00b7 ' + typeCount + ' types';
    }
    trendSessSub.textContent = sessLabel;

    // Plotly volume bar chart
    var container = $('chartStrength');
    if (filtered.length === 0) {
      showEmpty('chartStrength');
    } else {
      var dates = filtered.map(function(w) { return w.date; });
      var volumes = filtered.map(function(w) { return w.volume_lbs; });

      // Build hover text with volume, sets, and session-over-session delta %
      var hoverText = filtered.map(function(w, idx) {
        var titleStr = activeWorkoutTitle === '__all__' ? w.title + '<br>' : '';
        var volStr = w.volume_lbs.toLocaleString() + ' lbs';
        var setStr = w.set_count + ' sets';
        var delta = '';
        if (idx > 0 && filtered[idx - 1].volume_lbs > 0) {
          var d = ((w.volume_lbs - filtered[idx - 1].volume_lbs) / filtered[idx - 1].volume_lbs * 100);
          delta = '<br>\u0394 ' + (d >= 0 ? '+' : '') + d.toFixed(1) + '%';
        }
        return titleStr + volStr + '<br>' + setStr + delta;
      });

      // Color bars by workout type when showing all, solid green when filtered
      var barColors;
      if (activeWorkoutTitle === '__all__') {
        barColors = filtered.map(function(w) { return getTitleColor(w.title); });
      } else {
        barColors = '#22c55e';
      }

      Plotly.newPlot(container, [{
        x: dates,
        y: volumes,
        type: 'bar',
        marker: { color: barColors, opacity: 0.85 },
        text: hoverText,
        hovertemplate: '%{x}<br>%{text}<extra></extra>'
      }], baseLayout('Volume per Session', 'Date', 'Volume (lbs)'), plotConfig);
    }

    buildWorkoutLog(filtered);
  }

  function buildWorkoutLog(filtered) {
    var logEl = $('workoutLog');
    clearChildren(logEl);

    // Most recent first
    var reversed = filtered.slice().reverse();

    reversed.forEach(function(w, idx) {
      var row = document.createElement('div');
      row.className = 'wk-row';

      var detailId = 'wk-detail-' + idx;

      var header = document.createElement('div');
      header.className = 'wk-header';
      header.setAttribute('tabindex', '0');
      header.setAttribute('role', 'button');
      header.setAttribute('aria-expanded', 'false');
      header.setAttribute('aria-controls', detailId);

      var dateEl = document.createElement('span');
      dateEl.className = 'wk-date';
      var d = new Date(w.date + 'T00:00:00');
      dateEl.textContent = (d.getMonth() + 1) + '/' + d.getDate();
      header.appendChild(dateEl);

      var titleEl = document.createElement('span');
      titleEl.className = 'wk-title';
      titleEl.textContent = w.title;
      header.appendChild(titleEl);

      var exCount = document.createElement('span');
      exCount.className = 'wk-stat';
      exCount.textContent = w.exercise_count + 'ex';
      header.appendChild(exCount);

      var setCount = document.createElement('span');
      setCount.className = 'wk-stat';
      setCount.textContent = w.set_count + 's';
      header.appendChild(setCount);

      var volEl = document.createElement('span');
      volEl.className = 'wk-volume';
      volEl.textContent = w.volume_lbs.toLocaleString() + ' lbs';
      header.appendChild(volEl);

      // Detail section
      var detail = document.createElement('div');
      detail.className = 'wk-detail';
      detail.id = detailId;

      var detailInner = document.createElement('div');
      detailInner.className = 'wk-detail-inner';

      (w.exercises || []).forEach(function(ex) {
        var exDiv = document.createElement('div');
        exDiv.className = 'wk-exercise';

        var nameRow = document.createElement('div');
        nameRow.className = 'wk-exercise-name';

        var nameSpan = document.createElement('span');
        nameSpan.textContent = ex.name;
        nameRow.appendChild(nameSpan);

        var volSpan = document.createElement('span');
        volSpan.className = 'wk-exercise-vol';
        volSpan.textContent = ex.volume_lbs.toLocaleString() + ' lbs';
        nameRow.appendChild(volSpan);

        exDiv.appendChild(nameRow);

        (ex.sets || []).forEach(function(s) {
          var setDiv = document.createElement('div');
          setDiv.className = 'wk-set';

          var labelSpan = document.createElement('span');
          labelSpan.className = 'wk-set-label';
          labelSpan.textContent = 'Set ' + (s.set_index + 1);
          setDiv.appendChild(labelSpan);

          var weightSpan = document.createElement('span');
          weightSpan.className = 'wk-set-weight';
          weightSpan.textContent = (s.weight_lbs != null && s.weight_lbs > 0) ? s.weight_lbs + ' lbs' : 'BW';
          setDiv.appendChild(weightSpan);

          var repsSpan = document.createElement('span');
          repsSpan.className = 'wk-set-reps';
          repsSpan.textContent = s.reps + ' reps';
          setDiv.appendChild(repsSpan);

          exDiv.appendChild(setDiv);
        });

        detailInner.appendChild(exDiv);
      });

      detail.appendChild(detailInner);

      // Toggle handler
      function toggleDetail() {
        var expanded = header.getAttribute('aria-expanded') === 'true';
        header.setAttribute('aria-expanded', expanded ? 'false' : 'true');
        if (expanded) {
          detail.classList.remove('open');
        } else {
          detail.classList.add('open');
        }
      }

      header.addEventListener('click', toggleDetail);
      header.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggleDetail();
        }
      });

      row.appendChild(header);
      row.appendChild(detail);
      logEl.appendChild(row);
    });
  }

  // -- Calendar heatmap --
  function renderCalendar(calData) {
    var grid = $('calendarGrid');
    var monthsEl = $('calendarMonths');
    var stat = $('calendarStat');
    clearChildren(grid);
    clearChildren(monthsEl);

    if (!calData || !calData.days) return;

    var dayMap = {};
    var totalDays = 0;
    calData.days.forEach(function(d) {
      dayMap[d.date] = true;
      totalDays++;
    });

    var totalInRange = 0;
    var startDate = new Date(calData.range_start + 'T00:00:00');
    var endDate = new Date(calData.range_end + 'T00:00:00');

    // Count total days in range for percentage
    var tmp = new Date(startDate);
    while (tmp <= endDate) { totalInRange++; tmp.setDate(tmp.getDate() + 1); }
    var pct = totalInRange > 0 ? Math.round(totalDays / totalInRange * 100) : 0;
    stat.textContent = totalDays + ' days trained (' + pct + '%)';

    // Align start to Monday
    var dayOfWeek = startDate.getDay();
    var alignOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
    var cursor = new Date(startDate);
    cursor.setDate(cursor.getDate() + alignOffset);

    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var lastMonth = -1;
    var weekCount = 0;

    while (cursor <= endDate) {
      var week = document.createElement('div');
      week.className = 'cal-week';

      // Track month label for first day of this week
      var weekStart = new Date(cursor);
      if (weekStart.getMonth() !== lastMonth && weekStart >= startDate) {
        var monthSpan = document.createElement('span');
        monthSpan.textContent = MONTHS[weekStart.getMonth()];
        monthSpan.style.width = '17px';
        monthSpan.style.position = 'absolute';
        // Position will be handled by flex gap
        lastMonth = weekStart.getMonth();
      }

      for (var d = 0; d < 7; d++) {
        var cell = document.createElement('div');
        cell.className = 'cal-day';
        var dateStr = cursor.toISOString().split('T')[0];

        if (cursor >= startDate && cursor <= endDate) {
          if (dayMap[dateStr]) {
            cell.className += ' active';
          }
          var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          cell.title = dayNames[cursor.getDay()] + ' ' + dateStr + (dayMap[dateStr] ? ' - Trained' : ' - Rest');
        }

        week.appendChild(cell);
        cursor.setDate(cursor.getDate() + 1);
      }

      grid.appendChild(week);
      weekCount++;
    }

    // Build month labels positioned above the grid
    var cursor2 = new Date(startDate);
    cursor2.setDate(cursor2.getDate() + alignOffset);
    var prevMonth = -1;
    var weekIdx = 0;
    var monthPositions = [];

    while (cursor2 <= endDate) {
      var m = cursor2.getMonth();
      if (m !== prevMonth && cursor2 >= startDate) {
        monthPositions.push({ month: MONTHS[m], week: weekIdx });
        prevMonth = m;
      }
      cursor2.setDate(cursor2.getDate() + 7);
      weekIdx++;
    }

    // Render month labels with appropriate spacing
    var lastWeekPos = 0;
    monthPositions.forEach(function(mp) {
      var span = document.createElement('span');
      span.textContent = mp.month;
      var gapWeeks = mp.week - lastWeekPos;
      span.style.width = (gapWeeks * 17) + 'px'; // 14px cell + 3px gap
      monthsEl.appendChild(span);
      lastWeekPos = mp.week;
    });
  }

  // -- Panel switching --
  function switchPanel(name) {
    activePanel = name;

    cardRunning.className  = 'card' + (name === 'running'  ? ' active-running'  : '');
    cardVo2max.className   = 'card' + (name === 'vo2max'   ? ' active-vo2max'   : '');
    cardStrength.className = 'card' + (name === 'strength' ? ' active-strength' : '');

    $('panelRunning').className  = 'panel' + (name === 'running'  ? ' active' : '');
    $('panelVo2max').className   = 'panel' + (name === 'vo2max'   ? ' active' : '');
    $('panelStrength').className = 'panel' + (name === 'strength' ? ' active' : '');

    if (name === 'running')  renderRunningPanel();
    if (name === 'vo2max')   renderVo2maxPanel();
    if (name === 'strength') renderStrengthPanel();
  }

  // -- Data loading --
  function buildQS() {
    var s = startInput.value;
    var e = endInput.value;
    var params = [];
    if (s) params.push('start=' + s);
    if (e) params.push('end=' + e);
    return params.length ? '?' + params.join('&') : '';
  }

  function loadAll() {
    hideError();
    var qs = buildQS();

    $('runningValue').textContent = 'Loading...';
    $('runningSub').textContent = '\u00a0';
    $('vo2maxValue').textContent = 'Loading...';
    $('vo2maxSub').textContent = '\u00a0';
    $('strengthValue').textContent = 'Loading...';
    $('strengthSub').textContent = '\u00a0';

    Promise.all([
      fetch('/api/fitness/running' + qs).then(function(r) { if (!r.ok) throw new Error('Running API error: ' + r.status); return r.json(); }),
      fetch('/api/fitness/vo2max' + qs).then(function(r) { if (!r.ok) throw new Error('VO2 Max API error: ' + r.status); return r.json(); }),
      fetch('/api/fitness/strength' + qs).then(function(r) { if (!r.ok) throw new Error('Strength API error: ' + r.status); return r.json(); }),
      fetch('/api/fitness/calendar' + qs).then(function(r) { if (!r.ok) throw new Error('Calendar API error: ' + r.status); return r.json(); }),
    ]).then(function(results) {
      runData = results[0];
      vo2Data = results[1];
      strData = results[2];
      var calData = results[3];

      if (runData.generated_at) {
        var gen = new Date(runData.generated_at);
        var diffMin = Math.round((Date.now() - gen.getTime()) / 60000);
        syncInfo.textContent = 'Last sync: ' + (diffMin < 1 ? 'just now' : diffMin + 'm ago');
      }

      updateRunningCard();
      updateVo2maxCard();
      updateStrengthCard();
      renderCalendar(calData);
      switchPanel(activePanel);

    }).catch(function(err) {
      showError(err.message || 'Failed to load fitness data');
    });
  }


  // -- Preset handling --
  function setPreset(months) {
    activePreset = months;

    document.querySelectorAll('.preset-btn').forEach(function(btn) {
      var m = parseInt(btn.getAttribute('data-months'), 10);
      if (m === months) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });

    if (months === 0) {
      endInput.value = isoToday();
      startInput.value = isoMonthsAgo(59); // Just under 5-year API max
    } else {
      endInput.value = isoToday();
      startInput.value = isoMonthsAgo(months);
    }

    loadAll();
  }

  // -- Event listeners --
  cardRunning.addEventListener('click', function() { switchPanel('running'); });
  cardVo2max.addEventListener('click', function() { switchPanel('vo2max'); });
  cardStrength.addEventListener('click', function() { switchPanel('strength'); });

  [cardRunning, cardVo2max, cardStrength].forEach(function(card) {
    card.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        card.click();
      }
    });
  });

  document.querySelectorAll('.preset-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      setPreset(parseInt(btn.getAttribute('data-months'), 10));
    });
  });

  startInput.addEventListener('change', function() {
    document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
    activePreset = null;
    loadAll();
  });
  endInput.addEventListener('change', function() {
    document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
    activePreset = null;
    loadAll();
  });

  retryBtn.addEventListener('click', function() { loadAll(); });

  // -- Init --
  setPreset(6);

})();
</script>
